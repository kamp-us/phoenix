cleanupUnusedCatalogs: true

# Pin the whole effect family to the catalog (beta.83) tree-wide. Consumers peer the
# effect packages at open ranges (`drizzle-orm` rc.4 → `@effect/sql-*`/`effect`
# `>=4.0.0-beta.83`; `@distilled.cloud/cloudflare-*` → `@effect/platform-*`/`effect`
# `>=4.0.0-beta.78`), and the seed/audit/infra packages that pull them don't declare
# those peers directly — so pnpm otherwise resolves each peer to the highest published
# (beta.92) and drags second effect-family copies in, a dual install that breaks
# drizzle's `SQLiteTable` type identity across the two effect copies. The floor is
# capped at beta.83 because alchemy@2.0.0-beta.56 calls the `ConfigProvider.get` that
# effect removed in beta.84 (a runtime break, tests only). Re-visit on the next alchemy
# bump to lift toward the current effect beta.
overrides:
  '@effect/platform-bun': 'catalog:'
  '@effect/platform-node': 'catalog:'
  '@effect/sql-d1': 'catalog:'
  '@effect/sql-pg': 'catalog:'
  '@effect/vitest': 'catalog:'
  effect: 'catalog:'
  # Transitive (dep of @effect/platform-node/bun via a `^4.0.0-beta.83` caret, so pnpm
  # floats it to the highest published beta.92, which peers effect@beta.92 — the last
  # source of the second effect copy). Not a catalog member, so pin it explicitly to the
  # coordinated beta; keep in lockstep with the catalog on the next effect bump.
  '@effect/platform-node-shared': '4.0.0-beta.83'

onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js-pure
  - esbuild
  - lefthook
  - workerd

# Local patch (policy: patch deps locally, don't depend on an upstream/fork
# release). Two hunks, both NOT upstreamed; re-key on the next alchemy bump.
#
# 1. DurableObjectNamespace.d.ts — adds `DurableObjectNamespaceScope` to alchemy's
#    `DurableObjectServices` union so the `.make()` DO scope no longer leaks into
#    the Stack's requirements (alchemy.run.ts TS2375). Verified still absent from
#    beta.56: it defines `DurableObjectNamespaceScope` but never adds it to the
#    union in DurableObjectNamespace.d.ts (2026-06-16).
#
# 2. Cloudflare/Flagship/Flag.js — `FlagshipFlag.reconcile` UPDATE path reconciles
#    only the schema/metadata IaC owns ({variations, description}) and preserves the
#    live serving the dashboard owns ({defaultVariation, rules, enabled}); the no-op
#    skip compares only the schema. CREATE path unchanged (still seeds the full safe
#    initial flag). Implements ADR 0106 (IaC provisions flags; dashboard owns serving);
#    fixes the full-body PUT that clobbered live serving on every deploy (#840).
#
# Re-keyed beta.52 → beta.56 with the alchemy pin bump; re-target again on the next bump.
patchedDependencies:
  alchemy@2.0.0-beta.56: patches/alchemy@2.0.0-beta.56.patch
