# Local patch (policy: patch deps locally, don't depend on an upstream/fork
# release). Adds `DurableObjectNamespaceScope` to alchemy's `DurableObjectServices`
# union so the `.make()` DO scope no longer leaks into the Stack's requirements
# (alchemy.run.ts TS2375). NOT upstreamed — verified still absent from beta.52,
# in BOTH the npm published types AND the usirin/alchemy-effect fork source
# (the union in DurableObjectNamespace.ts never adds the Scope; 2026-06-06).
# Re-keyed beta.45 → beta.52 with the alchemy pin bump; re-target again on the next bump.
patchedDependencies:
  alchemy@2.0.0-beta.52: patches/alchemy@2.0.0-beta.52.patch
