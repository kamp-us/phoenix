# rc is sourced by every generated hook wrapper (under /bin/sh, absolute shebang)
# BEFORE lefthook runs — it restores the system bin dirs on PATH so lefthook can
# resolve sh even in the harness stripped-PATH worktree-spawn env (#787). See .lefthookrc.
#
# The path MUST be `./`-qualified. The generated wrapper sources it as `. <rc>`; under
# dash (CI's /bin/sh) a NO-SLASH argument to `.` triggers a PATH search, and when CWD is
# not on PATH the source fails `.: <rc>: not found` — and dash, being POSIX, treats a
# `.`-builtin failure in a non-interactive shell as FATAL and exits the shell immediately.
# For a non-aborting hook (pre-commit/post-checkout) that fatal exit was latent/harmless,
# but a `reference-transaction` hook aborts the git transaction on any non-zero, so the
# bare `. .lefthookrc` PATH-search miss bricked every ref update in CI (#2143 follow-up:
# leak-guard's `git fetch --depth=1 origin main` aborted). `./.lefthookrc` resolves by
# path (no PATH search) → sources cleanly, hardening ALL hooks against the same dash trap.
rc: ./.lefthookrc

# Git hooks, managed by lefthook (ADR 0068). The leak-guard pre-commit is the
# local fast-fail leg of the no-local-paths defense-in-depth (#158/#173); CI
# (.github/workflows/leak-guard.yml, #312) stays the unbypassable authority.
# Locally bypassable with `git commit --no-verify` by design.
pre-commit:
  commands:
    leak-guard:
      # The scanner self-scopes to doc surfaces, so handing it every staged file
      # is safe. `set --` turns the {staged_files} expansion into positional params
      # so the "nothing staged" early-out is a path-count test ($# -eq 0) — robust to
      # the multi-path expansion that gave a bare `[ -z … ]` extra operands (#806).
      # Exit-code contract from bin.ts (#332): 2 = confirmed leak (block); any
      # OTHER non-zero = scan couldn't run (warn + allow, CI is the authority);
      # 0 = clean. The deny-list lives once in findLeaks — nothing is re-grepped here.
      run: |
        set -- {staged_files}
        [ "$#" -eq 0 ] && exit 0
        status=0
        node packages/pipeline-cli/src/bin.ts leak-guard scan {staged_files} || status=$?
        if [ "$status" -eq 2 ]; then
          echo "blocked by leak-guard (#173); fix or \`git commit --no-verify\` to bypass" >&2
          exit 1
        elif [ "$status" -ne 0 ]; then
          echo "leak-guard: scan could not run (e.g. run 'pnpm install'); skipping local pre-commit check — CI is the authority" >&2
          exit 0
        fi
        exit 0

    # The #2144-killer local fast-fail: run biome (lint + format) on the staged
    # biome-handled files so a lint/format nit blocks the COMMIT locally instead of
    # burning a full CI round-trip (#2147; PR #2144 failed `pnpm lint` twice before a
    # clean 3rd push). biome is a single native binary (no `node_modules` runtime), so
    # this leg CAN fail-closed even in a lean agent worktree — unlike a deps-dependent
    # check, which is why lint/format lives here on pre-commit and vitest/typecheck on
    # pre-push. Bypassable with `git commit --no-verify` (humans only); CI stays the
    # unbypassable authority (ADR 0068).
    #
    # Fail-CLOSED on a REAL finding, fail-OPEN on an ABSENT toolchain — the load-bearing
    # distinction (#2147): a lint/format error MUST block the commit (biome's non-zero
    # exit → we exit 1), but a stripped-PATH / no-toolchain worktree where biome can't be
    # resolved MUST NOT abort (skip → exit 0), so it never bricks a lean worktree the way a
    # blanket fail-closed would. This is the INVERSE of the leak-guard "any non-zero →
    # allow" fail-open: here a resolved biome that FINDS an error blocks; only an
    # UNRESOLVABLE biome skips. The staged list is pre-filtered to biome-handled
    # extensions (the `lint:worktree` idiom) and early-outs when NONE match, so an
    # all-non-biome commit (e.g. a lefthook.yml-only change) is a clean pass, not a
    # spurious "No files were processed" non-zero — biome exits non-zero when its whole
    # input is unknown, which is NOT a finding and must not block.
    biome:
      run: |
        # Keep only the staged paths biome actually checks (same extension set the root
        # `lint:worktree` script uses); if none remain, there is nothing to lint — pass.
        FILES=$(printf '%s\n' {staged_files} | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|json|jsonc|css|graphql)$' || true)
        [ -z "$FILES" ] && exit 0
        # Resolve a biome runner without assuming PATH: the workspace-root bin (present
        # once deps are installed, incl. the post-checkout bootstrap) first, then `pnpm
        # exec`. If NEITHER resolves, the toolchain is absent — SKIP (fail-open on infra),
        # do not abort the commit. A resolved biome that reports a finding fails CLOSED.
        if [ -x node_modules/.bin/biome ]; then
          RUN="node_modules/.bin/biome"
        elif command -v pnpm >/dev/null 2>&1; then
          RUN="pnpm exec biome"
        else
          echo "biome: no biome binary on PATH (stripped-PATH/lean worktree, e.g. a harness spawn); skipping local pre-commit lint/format — CI is the authority" >&2
          exit 0
        fi
        if ! echo "$FILES" | xargs $RUN check --files-ignore-unknown=true; then
          echo "blocked by biome (lint/format, #2147); fix with \`pnpm format\` or \`git commit --no-verify\` to bypass" >&2
          exit 1
        fi

    # Read-only ATTRIBUTION for the #2778 primary-index mass-staged-deletion corruption: the
    # primary checkout's index accumulating a mass of staged deletions of the instruction-trust set
    # (.claude/**, .decisions/**, …) is the loaded-gun state — a commit + push from the primary would
    # land a control-plane mass-deletion on origin/main. This leg RECORDS (never blocks) the actor
    # about to commit that state at the one caller-agnostic choke point git fires — pre-commit —
    # capturing agent-type / session-id / cwd so the next occurrence is attributable. It NEVER gates
    # a commit (the recorder always exits 0); *preventing* the staging + *blocking* the commit is the
    # §CP hardening fix (ops/incidents/2778-primary-index-mass-staged-deletion.md), out of scope here.
    #
    # Fail-OPEN on an absent toolchain, exactly like leak-guard: a stripped-PATH / no-node worktree
    # can't run the recorder — SKIP (exit 0), never abort a commit. A resolved recorder is itself
    # non-blocking, so this leg can NEVER block a commit; CI/the §CP fix stay the real defense.
    primary-index-tripwire:
      run: |
        command -v node >/dev/null 2>&1 || {
          echo "primary-index-tripwire: no node on PATH (stripped-PATH/lean worktree); skipping #2778 attribution — read-only, non-blocking anyway" >&2
          exit 0
        }
        node packages/primary-index-tripwire/src/bin.ts record || true
        exit 0

    # The BLOCKING §CP containment for the #2778 corruption (#2784) — the prevention half the
    # record-only tripwire above names. It REFUSES a commit carrying the mass-staged-deletion
    # signature (a mass control-plane staged deletion) on the PRIMARY checkout: the one
    # caller-agnostic choke point that fires as the loaded-gun commit is CREATED, before a push can
    # fast-forward it to origin/main (ref-guard allows a fast-forward, so it can't catch this).
    # Scoped to the primary — a linked worktree's commit lands on a PR-reviewed feature branch.
    #
    # Fail-CLOSED on the guard's own refuse, fail-OPEN when the CLI can't RUN — same contract as
    # ref-guard: a not-yet-installed / stripped-PATH env (#787) or a bin remediation exit (#1798)
    # must NOT abort every commit repo-wide, so the guard signals a deliberate refuse with a
    # DEDICATED code (REFUSE_EXIT_CODE = 3), distinct from success (0) and any infra failure. ONLY
    # code 3 blocks; every other non-zero swallows to a clean allow.
    primary-index-guard:
      run: |
        command -v node >/dev/null 2>&1 || {
          echo "primary-index-guard: no node on PATH (stripped-PATH/lean worktree); skipping #2778 block — CI/the §CP fix stay the authority" >&2
          exit 0
        }
        status=0
        node packages/pipeline-cli/src/bin.ts primary-index-guard pre-commit || status=$?
        # exit 3 == the guard's deliberate refuse (abort the commit); any other non-zero == the CLI
        # couldn't run (node/CLI/module absent, crash) → fail-OPEN, allow.
        [ "$status" -eq 3 ] && exit 1
        exit 0

# The deps-dependent fast-fail tier (#2147): typecheck + changed-scoped unit tests fire
# at PUSH time, not commit time, because they need `node_modules` (unlike biome). Scoped so
# each push stays cheap — vitest `--changed origin/main` runs only the suites related to
# what this branch changed. Blocks the PUSH on a REAL failure so it never reaches CI; CI
# stays the unbypassable authority (ADR 0068). Bypassable with `git push --no-verify`
# (humans only; agents must not).
#
# Fail-CLOSED on a real error, fail-OPEN on an absent toolchain (the #2147 precondition,
# NOT the leak-guard "any non-zero → allow" fail-open): a type error or a failing unit test
# MUST block the push (the tool's non-zero → the command exits non-zero → lefthook blocks);
# but a stripped-PATH / no-toolchain worktree that cannot resolve pnpm MUST NOT abort (skip
# → exit 0), so a lean worktree is never bricked. The distinction is toolchain-absence
# (skip) vs toolchain-present-and-found-an-error (block) — the deps-tier does NOT silently
# exit 0 on a real finding the way the leak-guard fail-open does.
pre-push:
  parallel: false
  commands:
    typecheck:
      # tsgo across the workspace (the same `pnpm typecheck` CI runs); a type error fails
      # closed and blocks the push. Docs-only fast-path (#3130): a push whose diff vs
      # origin/main touches ONLY non-code paths (markdown/docs) has nothing tsgo checks, so
      # it skips the whole-repo run — mirroring the change-scoping the sibling `unit-changed`
      # leg gets from `--changed origin/main`. Fail-SAFE: any changed path not recognized as
      # docs — or a diff that can't be computed (origin/main unfetched) — runs the full
      # typecheck, so a code change is NEVER skipped. Toolchain-absence still fails open.
      run: |
        command -v pnpm >/dev/null 2>&1 || {
          echo "typecheck: no pnpm on PATH (stripped-PATH/lean worktree); skipping local pre-push typecheck — CI is the authority" >&2
          exit 0
        }
        CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null) || CHANGED=""
        # NON-DOC = changed paths that are NOT markdown/docs. Empty NON-DOC (with a non-empty
        # diff) ⇒ docs-only ⇒ skip. Tested via empty-output, not `grep -qv`: the `-q`+`-v`
        # combo misbehaves under some grep variants (ugrep returns non-zero even with
        # non-matching lines), which the empty-output form sidesteps portably.
        NONDOC=""
        [ -n "$CHANGED" ] && NONDOC=$(printf '%s\n' "$CHANGED" | grep -vE '\.(md|mdx|txt)$')
        if [ -n "$CHANGED" ] && [ -z "$NONDOC" ]; then
          echo "typecheck: docs-only push (every path changed vs origin/main is markdown/docs); skipping whole-repo typecheck — CI is the authority" >&2
          exit 0
        fi
        pnpm typecheck
    unit-changed:
      # `vitest run --changed origin/main` (unit project) — only the suites related to files
      # this branch changed vs origin/main, so a push stays cheap. Exits 0 cleanly when no
      # changed test is related (a docs-only push isn't spuriously blocked); a real failing
      # unit test fails closed and blocks the push.
      run: |
        command -v pnpm >/dev/null 2>&1 || {
          echo "unit-changed: no pnpm on PATH (stripped-PATH/lean worktree); skipping local pre-push unit tests — CI is the authority" >&2
          exit 0
        }
        pnpm --filter './apps/**' exec vitest run --config vitest.config.ts --project unit --changed origin/main

# `git worktree add` fires post-checkout, so this provisions a fresh worktree's deps —
# node_modules is gitignored and per-checkout, so a worktree is otherwise dead-on-arrival
# for typechecks (#504). Only a real `pnpm install` is CORRECT here: a filesystem-only
# SHARE of the primary's node_modules silently breaks workspace-edit correctness, because
# pnpm's virtual store holds RELATIVE links into workspace source
# (node_modules/.pnpm/node_modules/@kampus/* -> ../../../../packages/*), so a shared store
# resolves a consumer's @kampus/* dep to the PRIMARY checkout's source, not this worktree's
# edits. `pnpm install` rebuilds those links worktree-local — but it needs a pnpm at the
# pinned major, which the environment may not put on PATH (#1256; see ADR 0109). Regimes:
#  * corepack present: `corepack pnpm@PIN` — honors packageManager, version-exact.
#  * an on-PATH pnpm already at the pinned major: use it directly.
#  * only node+npm (the #3507 case): Node >=25 unbundles corepack and the machine's PATH
#    pnpm is a stale pnpm 8 the lockfile rejects, so BOTH tiers above miss — but npm ships
#    with node, so run the pin via `npm exec pnpm@PIN`, which fetches+runs the exact pinned
#    pnpm with no per-machine shim. This is what keeps a worktree spawn's pre-push gates
#    runnable instead of forcing --no-verify + a node_modules symlink into the primary.
#  * harness stripped-PATH spawn env (#787/#789): lefthook itself is unresolvable there, so
#    the hook never runs and creation never aborts; when this body DOES run with no toolchain
#    at all it is a clean SKIP (exit 0) and prints the one command to provision later.
# The pin is read from the root packageManager field (single source of truth, no drift), and
# no per-machine path is hardcoded (volta/Library pnpm shims are local — committing them would
# break other devs/CI); the store is resolved by pnpm itself.
post-checkout:
  commands:
    bootstrap-deps:
      run: |
        # Read the pin from packageManager (pnpm@X.Y.Z) without a node dependency — this hook
        # may run before the toolchain is warm; fall back to the literal if unparseable.
        PIN=$(sed -n 's/.*"packageManager"[[:space:]]*:[[:space:]]*"pnpm@\([^"+]*\).*/\1/p' package.json 2>/dev/null)
        [ -z "$PIN" ] && PIN="10.27.0"
        MAJOR="${PIN%%.*}"
        # Resolve a runner that executes pnpm at the pinned major (never the stale pnpm 8 the
        # lockfile rejects, #1256). Tiers, most-preferred first — see the block comment above.
        if command -v corepack >/dev/null 2>&1; then
          corepack prepare "pnpm@${PIN}" --activate >/dev/null 2>&1 || true
          set -- corepack "pnpm@${PIN}"
        elif command -v pnpm >/dev/null 2>&1 && [ "$(pnpm --version 2>/dev/null | cut -d. -f1)" = "$MAJOR" ]; then
          set -- pnpm
        elif command -v npm >/dev/null 2>&1; then
          set -- npm exec --yes "pnpm@${PIN}" --
        else
          echo "bootstrap-deps: no corepack, no pinned pnpm, and no npm on PATH (stripped hook exec env, e.g. a harness 'git worktree add') — skipping." >&2
          echo "bootstrap-deps: provision later with a full PATH: \`npm exec --yes pnpm@${PIN} -- install --prefer-offline --ignore-scripts\`." >&2
          exit 0
        fi
        # --ignore-scripts: a worktree shares .git/hooks (the common dir), so firing `prepare`
        # (lefthook install) from here would rewrite the SHARED hooks — provision deps, not lifecycle.
        "$@" install --prefer-offline --ignore-scripts

# The caller-agnostic ref-transaction guard (ADR 0160, #2143): refuse a DIVERGING
# refs/heads/main ref-move on the shared primary checkout (a non-fast-forward of
# origin/main). Unlike the #1571 worktree-guard PreToolUse Bash hook — which only arms
# for a $WORKTREE_ROOT subagent and only matches its HEAD_MOVING set — git's own
# reference-transaction boundary fires for EVERY ref update regardless of caller (agent
# Bash, harness worktree machinery, a manually-run command, or another git hook), which
# is exactly the class #2143's force-move (a bare branch -f/checkout -B/update-ref by the
# PULLER role, outside the agent Bash tool-call path) slipped past.
#
# git's contract: this hook runs on prepared|committed|aborted and gets one line per
# queued update (`<old> <new> <ref>`) on stdin (use_stdin: true); a non-zero exit is
# honored ONLY in the 'prepared' state, aborting the whole transaction. `{0}` is the
# state arg git passes. The pure decision core (ref-guard.ts) refuses only a diverging
# refs/heads/main move (exit 1); the legitimate PULLER `merge --ff-only origin/main` is
# a fast-forward and always passes (exit 0).
#
# Fail-CLOSED on the guard's own refusal but fail-OPEN when the CLI can't RUN — a
# not-yet-installed / stripped-PATH env (#787), or bin.ts's unlinked-dep remediation on a
# fresh/partial checkout (#1798, which itself exits 1), must NOT abort every ref
# transaction repo-wide (the #1050 guard.sh fail-open invariant). The guard signals a
# deliberate refuse with a DEDICATED code (REFUSE_EXIT_CODE = 3), distinct from both
# success (0) and any infra failure (1 / 127) — so ONLY code 3 propagates as an abort;
# every other non-zero swallows to a clean allow. `run` executes under sh.
reference-transaction:
  commands:
    ref-guard:
      use_stdin: true
      run: |
        # `|| status=$?` (not a bare call) so a non-zero node exit can NEVER trip an inherited
        # `set -e` and abort the transaction as a side effect — the guard aborts ONLY on its own
        # deliberate refuse code below, never on any infra failure (the #1050 fail-open invariant).
        status=0
        node packages/pipeline-cli/src/bin.ts ref-guard reference-transaction {0} || status=$?
        # exit 3 == the guard's deliberate refuse (abort the transaction); any other
        # non-zero == the CLI couldn't run (node/CLI/module absent, crash) → fail-OPEN, allow.
        [ "$status" -eq 3 ] && exit 1
        exit 0
