# rc is sourced by every generated hook wrapper (under /bin/sh, absolute shebang)
# BEFORE lefthook runs — it restores the system bin dirs on PATH so lefthook can
# resolve sh even in the harness stripped-PATH worktree-spawn env (#787). See .lefthookrc.
rc: .lefthookrc

# Git hooks, managed by lefthook (ADR 0068). The leak-guard pre-commit is the
# local fast-fail leg of the no-local-paths defense-in-depth (#158/#173); CI
# (.github/workflows/leak-guard.yml, #312) stays the unbypassable authority.
# Locally bypassable with `git commit --no-verify` by design.
pre-commit:
  commands:
    leak-guard:
      # The scanner self-scopes to doc surfaces, so handing it every staged file
      # is safe. `set --` turns the {staged_files} expansion into positional params
      # so the "nothing staged" early-out is a path-count test ($# -eq 0) — robust to
      # the multi-path expansion that gave a bare `[ -z … ]` extra operands (#806).
      # Exit-code contract from bin.ts (#332): 2 = confirmed leak (block); any
      # OTHER non-zero = scan couldn't run (warn + allow, CI is the authority);
      # 0 = clean. The deny-list lives once in findLeaks — nothing is re-grepped here.
      run: |
        set -- {staged_files}
        [ "$#" -eq 0 ] && exit 0
        status=0
        node packages/pipeline-cli/src/bin.ts leak-guard scan {staged_files} || status=$?
        if [ "$status" -eq 2 ]; then
          echo "blocked by leak-guard (#173); fix or \`git commit --no-verify\` to bypass" >&2
          exit 1
        elif [ "$status" -ne 0 ]; then
          echo "leak-guard: scan could not run (e.g. run 'pnpm install'); skipping local pre-commit check — CI is the authority" >&2
          exit 0
        fi
        exit 0

# `git worktree add` fires post-checkout, so this provisions a fresh worktree's deps —
# node_modules is gitignored and per-checkout, so a worktree is otherwise dead-on-arrival
# for typechecks (#504). Only a real `pnpm install` is CORRECT here: a filesystem-only
# SHARE of the primary's node_modules silently breaks workspace-edit correctness, because
# pnpm's virtual store holds RELATIVE links into workspace source
# (node_modules/.pnpm/node_modules/@kampus/* -> ../../../../packages/*), so a shared store
# resolves a consumer's @kampus/* dep to the PRIMARY checkout's source, not this worktree's
# edits. `pnpm install` rebuilds those links worktree-local — but it needs node/pnpm, which
# the harness PATH-stripped spawn env lacks (#1256; see ADR 0109). Two regimes:
#  * full PATH (a normal `git worktree add`): pin pnpm@10.27.0 and install — version-safe
#    (never the stale per-machine pnpm 8 the lockfile rejects) and workspace-correct.
#  * harness stripped-PATH spawn env (#787/#789): lefthook itself is unresolvable there, so
#    the hook never runs and creation never aborts; when this body DOES run with no toolchain
#    it is a clean SKIP (exit 0) and prints the one command to provision later under full PATH.
# No per-machine path is hardcoded (volta/Library pnpm shims are local — committing them would
# break other devs/CI); the store is resolved by pnpm itself.
post-checkout:
  commands:
    bootstrap-deps:
      run: |
        PIN="10.27.0"
        # Resolve a pnpm at the pinned major; prefer corepack (it honors packageManager).
        if command -v corepack >/dev/null 2>&1; then
          corepack prepare "pnpm@${PIN}" --activate >/dev/null 2>&1 || true
          set -- corepack "pnpm@${PIN}"
        elif command -v pnpm >/dev/null 2>&1; then
          set -- pnpm
        else
          echo "bootstrap-deps: no pnpm/corepack on PATH (stripped hook exec env, e.g. a harness 'git worktree add') — skipping." >&2
          echo "bootstrap-deps: provision later with a full PATH: \`corepack pnpm@${PIN} install --prefer-offline --ignore-scripts\` (or \`pnpm install\`)." >&2
          exit 0
        fi
        # Never install under the wrong major — the stale per-machine pnpm 8 the lockfile rejects (#1256).
        VER="$("$@" --version 2>/dev/null || echo 0)"
        case "$VER" in
          10.*) ;;
          *)
            echo "bootstrap-deps: resolved pnpm $VER (not the pinned ${PIN} major) and corepack can't pin it — skipping rather than install under the wrong toolchain (#1256)." >&2
            echo "bootstrap-deps: provision with \`corepack pnpm@${PIN} install\` once corepack is available." >&2
            exit 0
            ;;
        esac
        # --ignore-scripts: a worktree shares .git/hooks (the common dir), so firing `prepare`
        # (lefthook install) from here would rewrite the SHARED hooks — provision deps, not lifecycle.
        "$@" install --prefer-offline --ignore-scripts

# The caller-agnostic ref-transaction guard (ADR 0160, #2143): refuse a DIVERGING
# refs/heads/main ref-move on the shared primary checkout (a non-fast-forward of
# origin/main). Unlike the #1571 worktree-guard PreToolUse Bash hook — which only arms
# for a $WORKTREE_ROOT subagent and only matches its HEAD_MOVING set — git's own
# reference-transaction boundary fires for EVERY ref update regardless of caller (agent
# Bash, harness worktree machinery, a manually-run command, or another git hook), which
# is exactly the class #2143's force-move (a bare branch -f/checkout -B/update-ref by the
# PULLER role, outside the agent Bash tool-call path) slipped past.
#
# git's contract: this hook runs on prepared|committed|aborted and gets one line per
# queued update (`<old> <new> <ref>`) on stdin (use_stdin: true); a non-zero exit is
# honored ONLY in the 'prepared' state, aborting the whole transaction. `{0}` is the
# state arg git passes. The pure decision core (ref-guard.ts) refuses only a diverging
# refs/heads/main move (exit 1); the legitimate PULLER `merge --ff-only origin/main` is
# a fast-forward and always passes (exit 0).
#
# Fail-CLOSED on the guard's own refusal but fail-OPEN when the CLI can't RUN — a
# not-yet-installed / stripped-PATH env (#787), or bin.ts's unlinked-dep remediation on a
# fresh/partial checkout (#1798, which itself exits 1), must NOT abort every ref
# transaction repo-wide (the #1050 guard.sh fail-open invariant). The guard signals a
# deliberate refuse with a DEDICATED code (REFUSE_EXIT_CODE = 3), distinct from both
# success (0) and any infra failure (1 / 127) — so ONLY code 3 propagates as an abort;
# every other non-zero swallows to a clean allow. `run` executes under sh.
reference-transaction:
  commands:
    ref-guard:
      use_stdin: true
      run: |
        node packages/pipeline-cli/src/bin.ts ref-guard reference-transaction {0}
        status=$?
        # exit 3 == the guard's deliberate refuse (abort the transaction); any other
        # non-zero == the CLI couldn't run (fail-open, #1050) → allow. 0 == allow.
        [ "$status" -eq 3 ] && exit 1
        exit 0
