name: decisions-index

# The PR-side ADR-file validation for ambient ADR discovery (ADR 0126, #1718):
# there is no committed `.decisions/index.md` anymore, so nothing is regenerated
# or pushed on merge. `validate` remains the number-lock backstop — it asserts the
# ADR files carry no duplicate `id` and no filename/front-matter number mismatch
# (the #1471 collision class, the ADR 0074 number-lock). Discovery is ambient: the
# compact map is emitted by `pipeline-cli decisions-index compact` and injected via
# a SessionStart hook (#1728), with `ls .decisions/` + frontmatter as the fallback.
on:
  pull_request:

jobs:
  validate:
    name: validate ADR files — no duplicate/mismatched ADR number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Exit 1 on a duplicate ADR id or a filename/front-matter number mismatch
      # (reason on stderr); any other non-zero means the run could not complete.
      - name: Validate decisions ADR files
        run: node packages/pipeline-cli/src/bin.ts decisions-index validate
