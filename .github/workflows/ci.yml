name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: lint / test / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 26.2.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # The integration project (vitest.config.ts) deploys the alchemy stack to a
      # local workerd, but D1 is ALWAYS provisioned against real Cloudflare (no
      # offline D1) — so the suite needs real creds. On a dev machine these resolve
      # from a wrangler/alchemy profile; a clean runner has none, so inject them
      # from secrets. ALCHEMY_PASSWORD encrypts the worker's secret_text bindings
      # in localState. Turbo 2.x strict env mode strips undeclared vars, so these
      # are also listed under the `test` task's passThroughEnv in turbo.json.
      - name: Test (unit + integration)
        run: pnpm test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

      - run: pnpm typecheck
