name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Which parts of the tree changed — gates the cost-bearing jobs so a docs- or
  # skills-only PR doesn't pay for checks that cover none of the changed files.
  # `backend` gates the slow real-D1 `integration` suite; `code` gates `check`
  # (lint/format/typecheck) + `unit`, which a `.claude/**`/`.decisions/**`/`*.md`
  # PR shouldn't run (those paths are excluded by omission from `code`). Vitest's
  # own `--changed` can't do this: the integration tests are black-box (HTTP
  # against the deployed worker), so a `worker/**` edit never appears in their
  # module graph — a path filter is the right tool.
  changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      packages: ${{ steps.filter.outputs.packages }}
      workflows: ${{ steps.filter.outputs.workflows }}
      # Worker-relevance of the diff (issue #1014): `false` ONLY when the WHOLE PR
      # diff — including its `pnpm-lock.yaml` delta — is provably confined to packages
      # the worker never imports, so the slow real-D1 `integration`/`e2e` tiers can
      # skip. The `backend`/`e2e` filters list `pnpm-lock.yaml` (a worker-dep bump
      # needs integration) and `paths-filter` can't attribute a lockfile delta to a
      # package, so it ran integration on EVERY lockfile change — and a packages-only
      # PR (the #994 pipeline-cli reorg) edits the lockfile, paying the tier + the
      # #1010/#813 stage-leak flake for nothing. The `@kampus/worker-relevance`
      # classifier (run in the `worker-relevance` step below) attributes the lockfile
      # delta and FAILS SAFE TO RUNNING. Default `'true'`: the step only runs on PRs
      # (it needs a base ref), so a `push` keeps the full backstop, and any step
      # failure/skip leaves the safe default. ANDed into integration/e2e required-ness
      # below so it can only ever REMOVE a run, never add a skip the old gate didn't.
      worker_relevant: ${{ steps.worker-relevance.outputs.worker_relevant || 'true' }}
      # Per-gating-job *required-ness* (#786): the SINGLE SOURCE of "should this job
      # have run". Each `*_required` output mirrors the SAME inputs that gate the job's
      # own `if:` (path-filter outputs + the `feature-complete` PR label + the
      # event/author guard), so required-ness and run-ness read from ONE expression and
      # can't drift (the #375/#738 predicate-drift failure class). Each gating job's
      # `if:` consumes its `*_required` output, and `ci-required` consumes the same
      # outputs to tell a legitimate not-applicable skip from a should-have-run skip —
      # the latter is a silent-no-op (ADR 0092), so `ci-required` fails closed on it
      # instead of waving it through. `check` and `unit` share the `code`-gated
      # predicate, so both read `check_required`. The integration/e2e author+event
      # guards are reproduced EXACTLY so a fork/non-author PR's legitimate
      # secret-less skip stays legitimate (required=false ⇒ skip is a PASS).
      check_required: ${{ steps.filter.outputs.code == 'true' }}
      # `worker_relevant != 'false'` (issue #1014) is ANDed in LAST so it can only
      # REMOVE an integration run, never add one: a PR whose diff is provably confined
      # to worker-irrelevant packages skips the tier even though the lockfile delta
      # tripped `backend`. `!= 'false'` (not `== 'true'`) keeps the fail-safe default —
      # on a `push` the step doesn't run and the output defaults to `'true'`, so the
      # post-merge backstop is unchanged; the classifier itself fails safe to running.
      # The `feature-complete` forcing function still wins (it ORs with `backend`), and
      # since a feature-complete PR is by definition worker-affecting the worker-
      # relevance AND never strips a flagged full sweep in practice.
      integration_required: >-
        ${{ (steps.filter.outputs.backend == 'true' ||
             contains(github.event.pull_request.labels.*.name, 'feature-complete')) &&
            (steps.worker-relevance.outputs.worker_relevant || 'true') != 'false' &&
            (github.event_name == 'push' ||
             contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) }}
      e2e_required: >-
        ${{ steps.filter.outputs.e2e == 'true' &&
            (steps.worker-relevance.outputs.worker_relevant || 'true') != 'false' &&
            github.event_name == 'pull_request' &&
            contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
      # `packages-tests` runs the workspace `packages/**` vitest suites (#760). Its
      # single-sourced required-ness is JUST the `packages` path filter — the suites
      # are creds-free node-pool unit runs (no fork/author guard, unlike
      # integration/e2e), so a fork PR that touches `packages/**` MUST still run +
      # pass them. A non-packages PR has `packages_required == false`, so the job's
      # skip is a legitimate not-applicable PASS.
      packages_required: ${{ steps.filter.outputs.packages == 'true' }}
      # `actionlint` lints `.github/workflows/**` (issue #568). Its single-sourced
      # required-ness is JUST the `workflows` path filter — actionlint is creds-free
      # and fast (no author/fork guard), so any PR (incl. a fork) that touches a
      # workflow MUST run + pass it. A non-workflow PR has `workflows_required ==
      # false`, so the job's skip is a legitimate not-applicable PASS.
      workflows_required: ${{ steps.filter.outputs.workflows == 'true' }}
    steps:
      # Full history so the worker-relevance step's base...head diff resolves; the
      # default shallow checkout has no merge-base for the comparison (issue #1014).
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            # apps/**/… (not apps/web/…) so any app under apps/ is covered with no
            # filter edit — the discovery posture the package paths already have (ADR
            # 0057). `**` matches zero-or-more segments, so apps/web/worker/** etc. match
            # identically while web is the sole app (#1434).
            backend:
              - 'apps/**/worker/**'
              - 'apps/**/tests/integration/**'
              - 'apps/**/alchemy.run.ts'
              - 'infra/**'
              - 'apps/**/vitest.config.ts'
              - 'apps/**/package.json'
              # preview-seed's + moderator-grant's real-remote-D1 `integration` tiers
              # (ADR 0082, #672 / #930) run in the `integration` job below, so a change to
              # either must trip this gate.
              - 'packages/preview-seed/**'
              - 'packages/moderator-grant/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Paths the full e2e suite (#525) actually exercises: the SPA and its
            # build inputs (src, vite config, the served index.html shell), the
            # worker that serves it, the alchemy stack/D1 the preview deploys, the
            # specs + playwright config, and the seed tool. A docs/skills-only PR
            # touches none of these, so `e2e` stays false → the e2e job skips
            # (→ green, non-blocking). Includes both workflows so a CI/deploy edit
            # keeps the gate self-covering.
            e2e:
              - 'apps/**/src/**'
              - 'apps/**/index.html'
              - 'apps/**/vite.config.ts'
              - 'apps/**/worker/**'
              - 'apps/**/alchemy.run.ts'
              - 'apps/**/tests/e2e/**'
              - 'apps/**/playwright.config.cjs'
              - 'apps/**/package.json'
              - 'packages/preview-seed/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy.yml'
            # Source the `check`/`unit` jobs actually cover: app code, configs that
            # change lint/typecheck/test behavior, every package.json, the lockfile,
            # and this workflow itself (so a CI edit keeps self-coverage). Doc/skill
            # paths (.claude/**, .decisions/**, .patterns/**, *.md) are excluded by
            # omission, so a docs-only PR leaves `code` false and both jobs skip.
            code:
              - 'apps/**/worker/**'
              - 'apps/**/src/**'
              - 'apps/**/tests/**'
              - 'apps/**/tsconfig*.json'
              - 'apps/**/vitest.config.ts'
              - 'apps/**/alchemy.run.ts'
              - 'packages/**'
              - 'infra/**'
              - 'biome.jsonc'
              - 'tsconfig*.json'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - '**/package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Source the `packages-tests` job covers (#760): every `packages/**`
            # file (a guard/tooling change), plus the lockfile and root configs
            # whose change can alter how the suites resolve/run, and this workflow
            # itself (so a CI edit keeps the gate self-covering). A docs/skills-only
            # or apps/web-only PR touches none of these → `packages` false → the job
            # skips (→ green, non-blocking). Narrower than `code`: an apps/web/src
            # change runs `unit` but legitimately not-applicable-skips `packages-tests`.
            packages:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Every workflow file actionlint lints (issue #568). A non-workflow PR
            # touches none of these → `workflows` false → the `actionlint` job skips
            # (→ green, non-blocking). Includes actions/ so a composite/local action's
            # YAML is covered too, since actionlint validates referenced local actions.
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json

      # Worker-relevance classifier (issue #1014). Only on a PR (a `push` has no base
      # ref to diff and keeps the full integration backstop). Emits `worker_relevant`
      # — `false` ONLY when the whole diff (incl. the `pnpm-lock.yaml` delta, attributed
      # per importer block) is provably confined to packages the worker never imports;
      # any worker-affecting path, a shared lockfile section, an unattributable diff, or
      # any failure leaves it `true` (fail-safe to running). Runs the zero-runtime-dep
      # `@kampus/worker-relevance` bin directly — no `pnpm install` (the `ci-required`
      # idiom), so the always-on detector stays fast. `git diff base...head` over the
      # full-history checkout above gives the PR's changed files + the lockfile diff.
      - name: Classify worker-relevance of the diff
        id: worker-relevance
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Full base fetch (no `--depth=1`): the `fetch-depth: 0` checkout above already
          # has HEAD's full history, but a shallow `--depth=1` base re-fetch can land a base
          # commit sharing NO ancestor with HEAD on a branch whose base drifted behind a
          # fast-moving `main`, so `git merge-base` came back empty under `set -e` and
          # false-red the whole `changes` job (issue #1154). A full base fetch restores a
          # real merge-base.
          git fetch --no-tags origin "$BASE_REF"
          # Fail SAFE to running, not red, if a merge-base still can't be found (orphan/grafted
          # history): an empty base degrades to the two-dot range against `origin/$BASE_REF`,
          # which yields a superset diff → `worker_relevant=true` (the step's existing
          # fail-safe-to-running stance), never a hard step failure.
          if base="$(git merge-base "origin/$BASE_REF" HEAD)" && [ -n "$base" ]; then
            range="$base...HEAD"
          else
            echo "::warning::worker-relevance: no merge-base with origin/$BASE_REF — degrading to a full diff (fail-safe to running)"
            range="origin/$BASE_REF..HEAD"
          fi
          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMRD "$range")"
          LOCKFILE_DIFF="$(git diff "$range" -- pnpm-lock.yaml)"
          export CHANGED_FILES LOCKFILE_DIFF
          node packages/worker-relevance/src/bin.ts

  check:
    name: lint / format / typecheck
    needs: changes
    # Run-ness is single-sourced from the `changes` job's `check_required` output
    # (mirrors `code == 'true'`); `ci-required` reads the SAME output to require this
    # job's success when `check_required` is true. Skipped → green, not blocking (no
    # required-status-check rule on `main`, so a legitimate skip never wedges a
    # docs-only PR).
    if: needs.changes.outputs.check_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `biome check` is lint + format in one pass (tabs/100-col/no-bracket-spacing).
      - run: pnpm lint

      - run: pnpm typecheck

  unit:
    name: unit tests
    needs: changes
    # Same gate as `check`: skip (→ green, non-blocking) on a docs/skills-only PR.
    #
    # #771 evaluated PR-scoping this to the AC-relevant unit tests via `vitest run
    # --changed` (ADR 0082 blesses `--changed` for the unit tier — disjoint import
    # graphs). It is LEFT FULL deliberately: `--changed` is unsound HERE against
    # ADR 0092. Vitest forces `passWithNoTests=true` whenever `--changed` is set
    # (vitest 4 `resolveConfig`), so a `code`-true PR that edits a `worker/**`/`src/**`
    # module with NO unit test in its import graph runs ZERO tests and exits 0 — a
    # green that scanned nothing on a relevant change, exactly the silent-no-op
    # ADR 0092 forbids. The full run has no such hole. Sound PR-scoping needs a
    # zero-selection-is-FAIL wrapper (assert ≥1 spec selected on a `code`-true PR,
    # else fail) — that is gate-shaped (ADR 0092 fail-closed-on-zero-scope) and
    # belongs with the #738/#751 gate-owner, not guessed at here. Until then `unit`
    # runs FULL on every `code`-true PR + push (cheap: no DB, no creds).
    #
    # Shares `check`'s `code`-gated predicate, so it reads the same single-sourced
    # `check_required` output (#786) — `ci-required` requires this job's success when
    # `check_required` is true.
    if: needs.changes.outputs.check_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The `unit` vitest project (ADR 0082): node pool, no worker deploy, no
      # creds, no SQL engine. Fast signal over pure logic substituted directly at
      # the Drizzle seam — keyset/cursor-miss decisions, envelope shaping,
      # normalization, auth gates, Effect-DO builders over a DO-state fake.
      # Discovery-based across apps/ (the `pnpm --filter './packages/**'` idiom, ADR
      # 0057): runs each app's `test:unit`, so a second app is gated with no edit here.
      # Recursive `run` skips an app without the script — same posture as packages-tests.
      - run: pnpm --filter './apps/**' test:unit

  # The `packages/**` vitest suites (#760). Every workspace tooling/guard package
  # ships a `test` script (pipeline-cli — now the single home for the consolidated
  # guard/tooling logic — plus ci-required, …) but CI ran only `@kampus/web`'s — so a
  # regression in any gate guard's logic (incl. the #786 ci-required verdict
  # helper that runs HERE) shipped uncaught. This runs them as a REQUIRED gate.
  #
  # Discovery-based: `pnpm --filter './packages/**' run test` runs the `test`
  # script of every package that declares one, so a new `packages/<x>` with tests
  # is gated with no workflow edit. These are node-pool unit suites (ADR 0082): no
  # DB, no worker deploy, no creds — fast (~7s, ~500 tests), no sharding. Run FULL
  # (no `--changed`): the `packages` path filter already scopes the JOB, and a
  # full run has no zero-selection hole (ADR 0092) — same posture as `unit`.
  #
  # Unlike `ci-required`'s zero-dep bin, the suites need their deps, so this job
  # installs (`--frozen-lockfile`). Run-ness is single-sourced from
  # `changes.packages_required` (mirrors the `packages` filter); `ci-required`
  # reads the SAME output to require this job's success when packages changed.
  packages-tests:
    name: packages unit tests
    needs: changes
    if: needs.changes.outputs.packages_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter './packages/**' run test

  skills:
    name: validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      # Pure-bash guard, no toolchain: every .claude/skills/*/SKILL.md must carry
      # valid frontmatter (name + description, name == dir) or a skill silently
      # stops routing. Same script runs locally: `bash .claude/skills/validate-skills.sh`.
      - run: bash .claude/skills/validate-skills.sh

      # Portability safety net (ADR 0062 / 0083): assert every cycle-aware skill
      # (plan-epic/write-code/review-code/ship-it) no-ops gracefully with no
      # product-development-cycle.md — each cites the one canonical absence-probe
      # and an absent⇒no-op branch, and a hermetic doc-absent walkthrough holds.
      # Same script runs locally: `bash .claude/skills/validate-cycle-absence.sh`.
      - run: bash .claude/skills/validate-cycle-absence.sh

      # Present-path twin (issue #750, ADR 0091/0092): the absence script only ever
      # exercises the foreign-repo absent branch. This asserts phoenix's PRESENT path —
      # the cycle doc resolves `present` and each skill's present-branch action is wired
      # (plan-epic stamps, write-code ships dark, review-code gates, ship-it queues) — and
      # FAILS CLOSED on zero scope (missing doc ⇒ FAIL, never a silent no-op; ADR 0092).
      # Same script runs locally: `bash .claude/skills/validate-cycle-presence.sh`.
      - run: bash .claude/skills/validate-cycle-presence.sh

      # Gate-path drift guard (issue #720): assert the five CONTROL_PLANE_RE= copies
      # in ship-it/review-code/review-doc/review-skill/gh-issue-intake-formats are
      # byte-identical to the §CP canonical line, and that .claude/skills resolves to
      # marketplace.json's source + /skills. A rename of the plugin path otherwise
      # silently breaks all gate checks with no build-time failure.
      # Same script runs locally: `bash .claude/skills/validate-gate-path-drift.sh`.
      - run: bash .claude/skills/validate-gate-path-drift.sh

      # Flows-gate precondition guard (issue #751, epic #738): the authed write-flow
      # `flows` e2e lane stays NON-BLOCKING until #713 (write-flow state-isolation)
      # lands — flipping it blocking sooner trades a silent-no-op for a flaky block.
      # This asserts `flows non-blocking ⟺ FLOWS_GATE_PRECONDITION: pending` in
      # ci.yml, so a premature flip fails the build instead of shipping a flaky gate;
      # the #713 dependency is a fired gate, not a TODO comment. Deterministic/static
      # (no Playwright, no network) so it can't itself flake. Runs locally too:
      # `bash .claude/skills/validate-flows-gate-precondition.sh`.
      - run: bash .claude/skills/validate-flows-gate-precondition.sh

  # Reproducible workflow-YAML lint (issue #568). `.github/workflows/**` is the most
  # control-plane-sensitive, human-merged file class (ADR 0053), yet was validated
  # only by whoever happened to have actionlint installed locally — an ad-hoc,
  # non-reproducible install. This pins actionlint and feeds its result to
  # `ci-required`, so a malformed workflow (a bad `needs:`/`if:`, a typo'd job that
  # never feeds the gate) fails the required gate for everyone, no local install.
  #
  # Pinned for reproducibility the way the repo pins tooling: the version AND the
  # release-tarball SHA-256 are fixed here (the repo's action refs are pinned by tag;
  # a downloaded binary is pinned by tag + checksum so a re-tagged release can't slip
  # in). The hosted ubuntu runner ships shellcheck, so embedded `run:` scripts are
  # shell-linted too. Run-ness is single-sourced from `changes.workflows_required`;
  # `ci-required` reads the SAME output to require this job's success when a workflow
  # changed. A non-workflow PR skips → green (legit not-applicable, ADR 0092).
  actionlint:
    name: lint workflow YAML
    needs: changes
    if: needs.changes.outputs.workflows_required == 'true'
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install pinned actionlint
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl --fail --silent --show-error --location -o "$tarball" "$url"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum --check --status
          tar -xzf "$tarball" actionlint
          ./actionlint -version

      # actionlint globs .github/workflows/** itself; pass no files so a new workflow
      # is covered with no edit here. shellcheck (preinstalled on the runner) lints
      # the embedded `run:` scripts. A malformed workflow → non-zero exit → red gate.
      - name: Lint .github/workflows/**
        run: ./actionlint -color

  integration:
    name: integration tests
    needs: changes
    # Runs the full sweep when backend-ish paths changed (see `changes`) OR when
    # the `feature-complete` PR label is set (#771). The label is the forcing
    # function: a feature-complete PR runs the FULL integration sweep before merge
    # even if its changed paths didn't trip the backend filter — closing the window
    # where an un-swept backend regression rides in on a PR whose last commit looked
    # non-backend. A non-backend, non-flagged PR legitimately not-applicable-skips
    # (zero backend files = real empty scope, a legitimate skip, not a silent pass —
    # ADR 0092). `push` (main) keeps its existing backend-gated full run as the
    # post-merge backstop and is NOT gated on the flag (labels are a PR-only input).
    # Author gate (same as deploy.yml): this job injects real Cloudflare creds, so
    # it must never run for an outside contributor's PR. `push` always proceeds; PRs
    # run only for owners/org-members/collaborators. Mirrors the repo's
    # all_external_contributors fork-PR approval policy, made explicit.
    #
    # Run-ness AND required-ness are now single-sourced (#786, the required-ness half
    # deferred by #771): `changes.integration_required` is computed from the EXACT
    # inputs this `if:` used to inline — `(backend || feature-complete) && (push ||
    # author-allowed)` — so this job runs iff it should, and `ci-required` reads the
    # same output to require its success. The push-to-main backstop is preserved: on a
    # `push` event the author guard is satisfied by `github.event_name == 'push'` and
    # the label term is absent, so backend-changed pushes still run the full sweep,
    # flag-independent. A non-author/fork PR has `integration_required == false`, so
    # its secret-less skip stays a legitimate not-applicable PASS, never a FAIL.
    if: needs.changes.outputs.integration_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The worker binds `assets: ./dist/client`; the integration deploy needs the
      # SPA shell to exist even though the suite only asserts over the API/fate
      # HTTP surface.
      - name: Build SPA
        run: pnpm --filter './apps/**' build

      # The `integration` vitest project (ADR 0082): each file deploys the alchemy
      # stack to real remote Cloudflare under its own per-file isolated stage via
      # `Test.make`, so D1 is ALWAYS real (no offline D1) and the suite needs real
      # creds. It runs FULL on every push — change-scoped `--changed` does not
      # narrow it (one worker = one Stack, so any worker change is in every
      # integration test's graph); its speed comes from per-file-stage parallelism,
      # not selection. On a dev machine creds resolve from a wrangler/alchemy
      # profile; a clean runner has none, so inject them from secrets.
      # ALCHEMY_PASSWORD encrypts the worker's secret_text bindings in localState;
      # BETTER_AUTH_SECRET is self-supplied by the harness when unset.
      - name: Integration tests
        run: pnpm --filter './apps/**' test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

      # preview-seed's `integration` tier (ADR 0082, #672) is the same real-remote-D1
      # `Test.make` shape as @kampus/web's above — its `node:sqlite` fake is gone, so it
      # needs the same Cloudflare creds. The no-creds `packages-tests` job runs only its
      # `test` (now unit-only), so this creds-bearing job is its only home.
      - name: Integration tests (preview-seed)
        run: pnpm --filter @kampus/preview-seed test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

      # moderator-grant's `integration` tier (ADR 0082, #930) is the same real-remote-D1
      # `Test.make` shape as preview-seed's above — its `node:sqlite` fake is gone (the
      # ban's last survivor), so it needs the same Cloudflare creds. The no-creds
      # `packages-tests` job runs only its `test` (now unit-only), so this creds-bearing
      # job is its only home.
      - name: Integration tests (moderator-grant)
        run: pnpm --filter @kampus/moderator-grant test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

  # The blocking e2e gate (epic #462): run Playwright against the per-PR preview
  # deploy so "CI green" means the frontend renders + the gated flows work
  # end-to-end, not just that unit/integration pass. Two tiers (Playwright projects
  # in playwright.config.cjs):
  #   BLOCKING (gates `ci-required`): `unauth` (public read specs) + `setup`+`authed`
  #     (one real Better Auth sign-up captured into a storageState file the
  #     shared-session specs reuse, ADR 0085, #524). These are reliably green.
  #   NON-BLOCKING signal (`continue-on-error`): `flows` — the authed WRITE flows
  #     (each drives its own sign-up). They catch behavioral races like the form-wipe
  #     bug (#77/#438), but fail late under serial load on the shared preview (#713) —
  #     so they RUN for signal but don't wedge merge until #713's state-isolation
  #     lands and flips them blocking. The race fixes #707/#708 came out of this lane.
  #     The flip is GATED on #713 by a machine-checked precondition marker on the flows
  #     step (FLOWS_GATE_PRECONDITION) enforced by the `skills` job's
  #     validate-flows-gate-precondition.sh guard, so it can't be flipped to a flaky
  #     block early and can't silently stall after #713 closes (issue #751, epic #738).
  #
  # Target is the DEPLOYED preview, never a CI-booted workerd (the deploy already
  # runs in deploy.yml; #452's `spawn EBADF` is agent-sandbox-only, not Actions).
  # The preview URL + the stage's D1 id are produced by deploy.yml and surfaced in
  # the sticky `<!-- preview-deploy -->` PR comment — this job polls that comment
  # for the web line, seeds the D1, then points Playwright at the URL via
  # E2E_BASE_URL (#520's env-driven baseURL).
  #
  # Author/fork gate mirrors `integration` + deploy.yml: the seed injects real
  # Cloudflare creds, so it never runs for an outside contributor's PR. Path-gated
  # on `e2e` so a docs/skills-only PR skips → green (the `ci-required` aggregator
  # treats a skip as a pass).
  e2e:
    name: e2e (reads + authed blocking; flows non-blocking)
    needs: changes
    # Run-ness AND required-ness single-sourced (#786): `changes.e2e_required` mirrors
    # the EXACT inputs this `if:` inlined — `e2e-path && pull_request && author-allowed`
    # — and `ci-required` reads the same output. A fork/non-author or non-e2e-path PR
    # has `e2e_required == false`, so its skip stays a legitimate not-applicable PASS.
    if: needs.changes.outputs.e2e_required == 'true'
    runs-on: ubuntu-latest
    # Hang backstop (#660): the old `playwright install` hang stalled this job ~80min
    # with zero output before a human cancelled it. That install step is gone (the
    # container below prebakes the browsers), but cap the job anyway so ANY future
    # hang fails fast instead of burning the GH 6h default. Budget: container pull
    # (~3) + checkout/corepack/install (~3) + await-preview poll (10, its own
    # `core.setFailed` deadline) + seed (~1) + specs ~72s with one retry (~4) +
    # report upload (~1) ≈ 22min worst legit run; 25 leaves slack for a cold deploy
    # yet trips ~3× faster than the old stall.
    timeout-minutes: 25
    # Run in the Playwright-maintained image: chromium + headless-shell + ffmpeg
    # and all system deps are PREBAKED at /ms-playwright (PLAYWRIGHT_BROWSERS_PATH
    # is set in the image), so there's no `playwright install` download — which
    # hangs deterministically on the hosted runner (#522). Tag MUST match the
    # locked @playwright/test version (1.59.1) or the browsers won't match.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    permissions:
      contents: read
      pull-requests: read # read the sticky preview-deploy comment for URL + D1 id
    steps:
      - uses: actions/checkout@v4.2.2

      # The image ships Node 20+; `actions/setup-node` + `pnpm/action-setup` are
      # dropped (they'd fight the container's node). Corepack provisions the exact
      # pnpm pinned by the root `packageManager` field (pnpm@10.27.0).
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      # deploy.yml runs as a SEPARATE workflow on the same PR event; there's no
      # cross-workflow `needs`, so synchronize on its artifact — the sticky
      # comment. Poll until the web app's line carries both the preview URL and the
      # `<!-- d1:<uuid> -->` token deploy.yml writes once its deploy + D1 resolve
      # land. ~10 min budget covers a cold alchemy deploy; a stuck/failed deploy
      # times out and fails this job (red `ci-required`), never hangs forever.
      - name: Await preview URL + D1 id from deploy.yml
        id: preview
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const marker = "<!-- preview-deploy -->";
            const deadline = Date.now() + 10 * 60 * 1000;
            // Match the web app's block in the sticky comment, capturing the URL
            // and the hidden d1 token deploy.yml emits for web only.
            const webRe = /<!-- preview-deploy:web -->\n[^\n]*?(https:\/\/[A-Za-z0-9.-]+\.workers\.dev)[^\n]*?<!-- d1:([0-9a-f-]+) -->/;
            while (Date.now() < deadline) {
              const {data: comments} = await github.rest.issues.listComments({
                ...context.repo, issue_number: context.issue.number, per_page: 100,
              });
              const c = comments.find((x) => x.body?.includes(marker));
              const m = c && c.body.match(webRe);
              if (m) {
                core.setOutput("url", m[1]);
                core.setOutput("db", m[2]);
                core.info(`preview ready: ${m[1]} (D1 ${m[2]})`);
                return;
              }
              core.info("waiting for deploy.yml to post the web preview URL + D1 id…");
              await new Promise((r) => setTimeout(r, 15000));
            }
            core.setFailed("timed out waiting for the preview deploy (URL + D1 id) from deploy.yml");

      # Seed the preview's (empty) D1 with the minimal sözlük + pano fixtures the
      # read specs assert on and the write/flow specs navigate from — e.g. the
      # `flows` specs that open "the first post/term" (#521). Idempotent upsert, so
      # a re-run is safe.
      - name: Seed preview D1
        run: node packages/preview-seed/src/bin.ts run --database-id "${{ steps.preview.outputs.db }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # BLOCKING tier — the reliably-green lanes that gate `ci-required`. `authed`
      # pulls in its `setup` dependency automatically. A failure here fails the job
      # → reddens `ci-required` → blocks merge. E2E_BASE_URL points the run at the
      # preview (#520); `--reporter=html,list` leaves a browsable report for the
      # artifact below (traces from the config's `trace: on-first-retry` + CI retry).
      - name: Run e2e specs (blocking — unauth + authed)
        run: >-
          pnpm --filter './apps/**' exec playwright test
          --reporter=html,list
          --project unauth --project authed
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
          PLAYWRIGHT_HTML_OPEN: never

      # NON-BLOCKING tier — the `flows` write-flow lane runs for signal but
      # `continue-on-error` keeps its (currently load-flaky, #713) result from failing
      # the job, so it never wedges merge. Separate `--output` dir so its artifacts
      # don't clobber the blocking tier's; `list` reporter surfaces pass/fail in the
      # job log.
      #
      # FLIP-TO-BLOCKING is gated on #713 (write-flow state-isolation): until that
      # preview load wall is fixed the lane fails late under serial load, so flipping
      # it blocking now would trade a silent-no-op for a FLAKY hard-block. The flip is
      # therefore encoded as a machine-checked precondition rather than a TODO comment:
      # the marker below is the single source the `validate-flows-gate-precondition.sh`
      # CI guard reads to enforce `flows non-blocking ⟺ #713 open`. To flip blocking
      # (only once #713 has closed): set FLOWS_GATE_PRECONDITION to `met`, fold the
      # `--project flows` run into the BLOCKING step above (drop this step's
      # `continue-on-error`), and the guard re-checks the new invariant. Do NOT flip
      # while the marker reads `pending` — the guard will fail the build (issue #751).
      #
      # #771 seam (symmetric to `integration`): `flows` already runs for SIGNAL on
      # every e2e-path push (non-blocking here), the e2e analog of integration's
      # flag-forced full sweep. The promotion to BLOCKING is the FUTURE co-action
      # owned with #751 (flip on path/flag, not every-push — §6 #3 of the #771
      # co-design). The marker line below is #751's flip seam — do NOT edit it here.
      #
      # FLOWS_GATE_PRECONDITION: pending  (requires: #713 — write-flow state-isolation)
      - name: Run e2e specs (non-blocking — flows, #713)
        continue-on-error: true
        run: >-
          pnpm --filter './apps/**' exec playwright test
          --reporter=list
          --project flows
          --output test-results-flows
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
          PLAYWRIGHT_HTML_OPEN: never

      # `!cancelled()` (not `failure()`): the job is GREEN when only the non-blocking
      # `flows` tier fails, so `failure()` would drop the flows report — the one we
      # most want for #713 triage. Upload whenever the run completed; `if-no-files-found`
      # ignores the all-clean case.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4.4.3
        with:
          name: playwright-report
          path: |
            apps/**/playwright-report/
            apps/**/test-results/
            apps/**/test-results-flows/
          retention-days: 7
          if-no-files-found: ignore

  # The one always-on context safe to mark required on `main` (#461/#402). The
  # code gates above (`check`/`unit`/`integration`/`e2e`) are conditional: each
  # skips on a PR whose changed paths it doesn't cover (docs/skills-only,
  # non-backend, external-author). Listing a *conditional* context in a ruleset's
  # required_status_checks wedges those PRs — GitHub's skipped-as-success handling
  # for `if:`+`needs:` jobs is unreliable across configs. This aggregator always
  # reports (`if: !cancelled()` keeps it from skipping when a dep skips) and is the
  # one context the ruleset requires, transitively enforcing the conditional checks.
  #
  # FLAG/PATH-AWARE required-ness (#786, ADR 0092): treating EVERY `skipped` dep as a
  # pass is a silent-no-op — a gating job that SHOULD have run but was skipped (a
  # misconfigured `if:`, a path-filter miss, a flag not honored) read as a free PASS.
  # So per job this asserts against the SAME `changes.*_required` single source its
  # own `if:` consumes: should-run ⇒ the result MUST be `success` (a `skipped` or any
  # non-success FAILS closed); should-not-run ⇒ a `skipped` is a legitimate
  # not-applicable PASS (`success` is fine too). Required-ness and run-ness therefore
  # read from ONE place (no predicate re-derivation here, no drift), and the verdict
  # per job is EMITTED to the log (ADR 0092 §1 "emit what you scanned"), so a quietly
  # -skipped required job is visible in the run, not only in the exit code.
  #
  # The verdict logic is the PURE, UNIT-TESTED `@kampus/ci-required` core
  # (packages/ci-required) — `node packages/ci-required/src/bin.ts` reads the
  # `needs.*` env below and exits 0/1. It is a ZERO-RUNTIME-DEPENDENCY plain-Node
  # module (node strips the TS types natively), so this gate job runs only
  # checkout + setup-node + node — NO `pnpm install` — keeping the always-on
  # aggregator fast. Its full matrix (the 4 integration scenarios, the packages-tests
  # required/legit-skip/fail cases, the fork skip, a genuine failure, and the
  # changes-job-itself-failed fail-closed case) lives in ci-required.unit.test.ts,
  # run by the `packages-tests` lane (which gates all `packages/**` suites, #760).
  ci-required:
    name: ci-required
    needs: [changes, check, unit, packages-tests, actionlint, integration, e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json

      - name: Require should-have-run gating jobs to have passed (skip is legit only when not required)
        env:
          # `check` and `unit` share the single-sourced `check_required`; integration
          # and e2e read their own. Pair each job's should-run with its result so the
          # helper reads required-ness and run-ness from ONE source per job.
          CHANGES_RESULT: ${{ needs.changes.result }}
          CHECK_REQUIRED: ${{ needs.changes.outputs.check_required }}
          INTEGRATION_REQUIRED: ${{ needs.changes.outputs.integration_required }}
          E2E_REQUIRED: ${{ needs.changes.outputs.e2e_required }}
          PACKAGES_REQUIRED: ${{ needs.changes.outputs.packages_required }}
          WORKFLOWS_REQUIRED: ${{ needs.changes.outputs.workflows_required }}
          CHECK_RESULT: ${{ needs.check.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          PACKAGES_RESULT: ${{ needs.packages-tests.result }}
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: node packages/ci-required/src/bin.ts
