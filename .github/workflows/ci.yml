name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The merge queue awaits `ci-required` on the batched `merge_group` ref before it can
  # merge; without this trigger that required check never runs on the batch and every
  # queued merge hangs (ADR 0132).
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege baseline: every job gets a read-only token unless it declares its own
# block. `changes` and `e2e` elevate to `pull-requests: read` at the job level below.
permissions:
  contents: read

jobs:
  # Which parts of the tree changed — gates the cost-bearing jobs so a docs- or
  # skills-only PR doesn't pay for checks that cover none of the changed files.
  # `backend` gates the slow real-D1 `integration` suite; `code` gates `check`
  # (lint/format/typecheck) + `unit`, which a `.claude/**`/`.decisions/**`/`*.md`
  # PR shouldn't run (those paths are excluded by omission from `code`). Vitest's
  # own `--changed` can't do this: the integration tests are black-box (HTTP
  # against the deployed worker), so a `worker/**` edit never appears in their
  # module graph — a path filter is the right tool.
  changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
      packages: ${{ steps.filter.outputs.packages }}
      workflows: ${{ steps.filter.outputs.workflows }}
      # Worker-relevance of the diff (issue #1014): `false` ONLY when the WHOLE PR
      # diff — including its `pnpm-lock.yaml` delta — is provably confined to packages
      # the worker never imports, so the slow real-D1 `integration`/`e2e` tiers can
      # skip. The `backend`/`e2e` filters list `pnpm-lock.yaml` (a worker-dep bump
      # needs integration) and `paths-filter` can't attribute a lockfile delta to a
      # package, so it ran integration on EVERY lockfile change — and a packages-only
      # PR (the #994 pipeline-cli reorg) edits the lockfile, paying the tier + the
      # #1010/#813 stage-leak flake for nothing. The `@kampus/worker-relevance`
      # classifier (run in the `worker-relevance` step below) attributes the lockfile
      # delta and FAILS SAFE TO RUNNING. Default `'true'`: the step runs on `pull_request`
      # and `merge_group` (issue #3079) but not `push` (no base ref), so a `push` keeps the
      # full backstop, and any step failure/skip leaves the safe default. ANDed into
      # integration/e2e required-ness below so it can only ever REMOVE a run, never add a
      # skip the old gate didn't.
      worker_relevant: ${{ steps.worker-relevance.outputs.worker_relevant || 'true' }}
      # Per-gating-job *required-ness* (#786): the SINGLE SOURCE of "should this job
      # have run". Each `*_required` output mirrors the SAME inputs that gate the job's
      # own `if:` (path-filter outputs + the `feature-complete` PR label + the
      # event/author guard), so required-ness and run-ness read from ONE expression and
      # can't drift (the #375/#738 predicate-drift failure class). Each gating job's
      # `if:` consumes its `*_required` output, and `ci-required` consumes the same
      # outputs to tell a legitimate not-applicable skip from a should-have-run skip —
      # the latter is a silent-no-op (ADR 0092), so `ci-required` fails closed on it
      # instead of waving it through. `check` and `unit` share the `code`-gated
      # predicate, so both read `check_required`. The integration/e2e author+event
      # guards are reproduced EXACTLY so a fork/non-author PR's legitimate
      # secret-less skip stays legitimate (required=false ⇒ skip is a PASS).
      # On the merge queue's batched `merge_group` ref there is no PR base for
      # `paths-filter` to diff, so every `*_required` output ORs in `merge_group` to run
      # the FULL gate on the batch (fail-safe to running — the same stance the
      # worker-relevance classifier takes). The batch ref is the prospective merge of all
      # queued PRs, so cost-optimization path-filtering doesn't apply there (ADR 0132).
      check_required: ${{ github.event_name == 'merge_group' || steps.filter.outputs.code == 'true' }}
      # `worker_relevant != 'false'` (issue #1014) is ANDed in LAST so it can only
      # REMOVE an integration run, never add one: a PR whose diff is provably confined
      # to worker-irrelevant packages skips the tier even though the lockfile delta
      # tripped `backend`. `!= 'false'` (not `== 'true'`) keeps the fail-safe default —
      # on a `push` the step doesn't run and the output defaults to `'true'`, so the
      # post-merge backstop is unchanged; the classifier itself fails safe to running.
      # The `feature-complete` forcing function still wins (it ORs with `backend`), and
      # since a feature-complete PR is by definition worker-affecting the worker-
      # relevance AND never strips a flagged full sweep in practice.
      # `merge_group` now respects the SAME two change-detection gates the `pull_request`
      # path trusts, ANDed together — the `backend` path filter AND the worker-relevance
      # classifier — instead of ORing in FIRST to force the full suite on every batch. The
      # old unconditional merge_group run let a flaky real-CF integration suite evict clean
      # worker-IRRELEVANT PRs from the queue (#3075: #3067/#3073/#3074/#3064; #3079 added the
      # worker-relevance AND). But worker-relevance alone was still COARSER than the PR-head
      # gate: it fail-safes any non-`packages/**` path (a docs/markdown/skills diff) to
      # `relevant`, so a docs-only batch RAN integration on merge_group even though the
      # `backend` path filter SKIPS it on the PR head — the two contexts disagreed, and a
      # clean docs-only PR got dequeued when that gating run hit the teardown flake
      # (#3514/#690/#813; PR #3512, run 29659047210). Fix: gate the merge_group branch on the
      # SAME `backend` path filter the PR head uses, so the skip decision is consistent across
      # PR head and merge_group. `steps.filter.outputs.backend` IS computed on merge_group —
      # dorny diffs the batch's two-dot `base_sha..head` (the `mergebase` step above pins its
      # `base` to `merge_group.base_sha`; #3797), i.e. the batch's cumulative diff on a STABLE
      # basis — so a docs-only batch has `backend == false` deterministically in every batch,
      # matching the PR head. (Before #3797 an empty `base` sent dorny to a merge-base search
      # against a moving `main`, so the SAME docs-only PR #3747 flapped in-scope/out-of-scope
      # across batches and a clean PR got ejected.) The worker-relevance AND is retained: a
      # lockfile-triggered-but-worker-irrelevant batch (`backend == true`, `worker_relevant ==
      # false`) still skips, mirroring the PR head. FAIL-SAFE TO RUNNING is preserved end to
      # end — `|| 'true'` defaults an absent/empty worker_relevant to running, the classify
      # step emits `worker_relevant=true` on any missing base/head SHA or unresolvable diff,
      # and dorny lists a superset of files on any diff ambiguity → `backend=true` → RUN; so
      # any doubt RUNS integration, never skips (the #3079 threat model: a mis-classified
      # batch must never skip and merge broken). The batch still runs in the trusted base's
      # context with repo secrets, so the PR-only fork/author guard does not apply.
      integration_required: >-
        ${{ (github.event_name == 'merge_group' &&
             steps.filter.outputs.backend == 'true' &&
             (steps.worker-relevance.outputs.worker_relevant || 'true') != 'false') ||
            ((steps.filter.outputs.backend == 'true' ||
             contains(github.event.pull_request.labels.*.name, 'feature-complete')) &&
            (steps.worker-relevance.outputs.worker_relevant || 'true') != 'false' &&
            (github.event_name == 'push' ||
             contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))) }}
      # e2e is DELIBERATELY the ONE gating job NOT ORed-in on `merge_group` — it is
      # the opposite stance of check/integration/packages/workflows above (which DO
      # OR in `merge_group` to run the full gate on the batch, because they need no
      # deploy). e2e alone awaits a live preview URL + D1 id from deploy.yml, and
      # deploy.yml has NO `merge_group` trigger (only `push: [main]` + `pull_request`),
      # so a batch can't produce a preview — e2e would await one forever, time out,
      # and red `ci-required`, ejecting the whole batch (ADR 0132; run 28645439324).
      # e2e already gated every PR in the `pull_request` context (where deploy.yml
      # runs), so leaving `e2e_required == false` on `merge_group` skips it on the
      # batch (→ green legit-skip in ci-required) without losing PR-time coverage.
      # The pull_request-context requiredness below is unchanged.
      e2e_required: >-
        ${{ steps.filter.outputs.e2e == 'true' &&
            (steps.worker-relevance.outputs.worker_relevant || 'true') != 'false' &&
            github.event_name == 'pull_request' &&
            contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
      # `packages-tests` runs the workspace `packages/**` vitest suites (#760). Its
      # single-sourced required-ness is JUST the `packages` path filter — the suites
      # are creds-free node-pool unit runs (no fork/author guard, unlike
      # integration/e2e), so a fork PR that touches `packages/**` MUST still run +
      # pass them. A non-packages PR has `packages_required == false`, so the job's
      # skip is a legitimate not-applicable PASS.
      packages_required: ${{ github.event_name == 'merge_group' || steps.filter.outputs.packages == 'true' }}
      # `actionlint` lints `.github/workflows/**` (issue #568). Its single-sourced
      # required-ness is JUST the `workflows` path filter — actionlint is creds-free
      # and fast (no author/fork guard), so any PR (incl. a fork) that touches a
      # workflow MUST run + pass it. A non-workflow PR has `workflows_required ==
      # false`, so the job's skip is a legitimate not-applicable PASS.
      workflows_required: ${{ github.event_name == 'merge_group' || steps.filter.outputs.workflows == 'true' }}
    steps:
      # Full history so the worker-relevance step's base...head diff resolves; the
      # default shallow checkout has no merge-base for the comparison (issue #1014).
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # DIFF BASIS — the single source of "what change-detection diffs against" for BOTH
      # cost-gated contexts (issue #3722 for `pull_request`, #3797 for `merge_group`), as
      # load-bearing as the `token: ''` mode below. dorny's `base` input decides it, and an
      # EXPLICIT COMMIT SHA is the only STABLE choice: dorny takes its deterministic two-dot
      # `git diff <base>..<head>` path ONLY when `base` is a SHA (grounded in v3.0.2
      # `src/main.ts` `getChangedFilesFromGit`: `isBaseSha` ⇒ `git.getChanges(baseSha, head)`;
      # `src/git.ts` `getChanges` runs `git diff --name-status <base>..<head>`). A NON-SHA base
      # — or an EMPTY one — instead routes to `getChangesSinceMergeBase`, a THREE-DOT merge-base
      # search with depth-limited incremental fetching against a MOVING `main`, whose result
      # drifts run to run. So this step emits a SHA per event:
      #   - pull_request: the true merge base of `base.sha..HEAD`, so dorny's two-dot diff
      #     equals the PR's own three-dot diff. `base.sha` is the base BRANCH TIP at event time
      #     while the checked-out `refs/pull/N/merge` is built on an older tip, so diffing raw
      #     `base.sha` reports every file main changed since, in reverse — the 22 phantom `e2e:`
      #     hits that wedged PR #3713 (10-min preview poll on a deploy that correctly skipped).
      #   - merge_group: the batch's own `base_sha`. An empty `base` here defaulted dorny to
      #     `base = defaultBranch` ('main', a BRANCH NAME — not a SHA) ⇒ the unstable
      #     merge-base-against-moving-main path, so the IDENTICAL docs-only PR #3747 got
      #     "integration in scope" in one batch (flaked → ejected) and "out" in the next (#3797).
      #     Pinning `base` to `merge_group.base_sha` makes dorny diff two-dot `base_sha..head_sha`
      #     — the batch's cumulative diff on a stable basis, byte-for-byte the SAME basis the
      #     worker-relevance classifier already uses (its `range=` below), so the two ANDed
      #     integration signals read ONE basis and identical batch content yields an identical
      #     scope decision every batch.
      # deploy.yml's filter reads the same globs off this same `base:` input, so both stay
      # anchored to one basis or they classify the same PR differently (`path-filter-guard`
      # fails closed on that drift). Fail-safe: on any failure the output is empty, dorny falls
      # back to its default-branch merge-base basis, and detection stays WIDE (it over-reports,
      # never under-reports) — a doubt always RUNS a gate, never skips one.
      - id: mergebase
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
        run: |
          set -uo pipefail
          if [ "$GITHUB_EVENT_NAME" = "merge_group" ]; then
            if [ -n "$MERGE_GROUP_BASE_SHA" ]; then
              echo "sha=$MERGE_GROUP_BASE_SHA" >> "$GITHUB_OUTPUT"
              echo "::notice::change-detection diff basis = merge_group base_sha $MERGE_GROUP_BASE_SHA (stable two-dot batch diff base_sha..head)"
            else
              echo "::warning::merge_group base_sha empty — falling back to dorny's default-branch merge-base basis (detection stays wide, never narrower)"
            fi
          elif sha=$(git merge-base "${{ github.event.pull_request.base.sha }}" HEAD 2>/dev/null); then
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
            echo "::notice::change-detection diff basis = merge base $sha (base.sha ${{ github.event.pull_request.base.sha }})"
          else
            echo "::warning::could not resolve a merge base — falling back to dorny's base.sha basis (detection stays wide, never narrower)"
          fi

      # API-free git-mode change detection (#3245). dorny/paths-filter reads the changed
      # file set two ways: on a `pull_request` event it calls the GitHub REST API
      # (`pulls.listFiles`) WHEN a `token` is set, and ONLY when the token is empty does it
      # fall back to a pure `git diff` against `pull_request.base.sha` (grounded in dorny
      # v3.0.2 `src/main.ts` — the PR-event branch of `getChangedFiles`: `if (token) return
      # getChangedFilesFromApi(...)`, else "Github token is not available - changes will be
      # detected using git diff"). That live API read is the sole flake surface in this job:
      # a transient GitHub-API-HTML blip served an error page where JSON was expected
      # (`invalid character '<'`), hard-failing this step → `produce run-evidence bundle` →
      # the `ci-required` aggregate went RED on a defect-free docs-only PR (#3244). Setting
      # `token: ''` forces the git-diff path, removing the API read entirely so the transient
      # CANNOT occur — a stronger fix than retrying a read we don't need to make. The
      # `fetch-depth: 0` checkout above carries `base.sha`, so the diff resolves offline; the
      # `merge_group`/`push` paths never used the API (they always git-diff via
      # `getChangedFilesFromGit`, no token consumed) and are unaffected. A GENUINE git/detection
      # error still hard-fails this step (fail-closed) — only the API-HTML transient is removed,
      # never the real gate signal. `pipeline-cli change-detect-guard check` (change-detect-guard.yml)
      # fails closed if this `token: ''` ever regresses back to the API mode.
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          token: ''
          # The explicit diff basis the `mergebase` step above pins: the PR merge base on
          # `pull_request`, the batch `base_sha` on `merge_group` (#3797), and empty on `push`
          # (dorny keeps its default-branch merge-base backstop there). `path-filter-guard`
          # fails closed if this `token`/`base` pairing ever drifts from deploy.yml's.
          base: ${{ steps.mergebase.outputs.sha }}
          filters: |
            # apps/**/… (not apps/web/…) so any app under apps/ is covered with no
            # filter edit — the discovery posture the package paths already have (ADR
            # 0057). `**` matches zero-or-more segments, so apps/web/worker/** etc. match
            # identically while web is the sole app (#1434).
            backend:
              - 'apps/**/worker/**'
              - 'apps/**/tests/integration/**'
              - 'apps/**/alchemy.run.ts'
              - 'infra/**'
              - 'apps/**/vitest.config.ts'
              - 'apps/**/package.json'
              # preview-seed's + moderator-grant's real-remote-D1 `integration` tiers
              # (ADR 0082, #672 / #930) run in the `integration` job below, so a change to
              # either must trip this gate.
              - 'packages/preview-seed/**'
              - 'packages/moderator-grant/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Paths the full e2e suite (#525) actually exercises: the SPA and its
            # build inputs (src, vite config, the served index.html shell), the
            # worker that serves it, the alchemy stack/D1 the preview deploys, the
            # specs + playwright config, and the seed tool. A docs/skills-only PR
            # touches none of these, so `e2e` stays false → the e2e job skips
            # (→ green, non-blocking). Includes both workflows so a CI/deploy edit
            # keeps the gate self-covering.
            #
            # SYNC INVARIANT (issue #2366): deploy.yml's `changes.deploy` filter is a
            # byte-for-byte COPY of this list — deploy's RUN-set must be a superset of
            # this e2e RUN-set, or a PR that trips e2e but skips its deploy makes e2e's
            # 10-min preview-comment poll time out and wedge `ci-required`. An edit to
            # THIS list MUST be mirrored into deploy.yml's `deploy:` filter (and vice
            # versa) — keep the two path sets identical. ENFORCED MECHANICALLY (issue
            # #2372) by `pipeline-cli path-filter-guard check` (the path-filter-guard.yml
            # job), which fails the build if this `e2e:` set and deploy.yml's `deploy:`
            # set drift apart — this comment documents the invariant; the guard defends it.
            #
            # Equal lists are only HALF the invariant (#3722): the two steps must also read
            # the same changed-file set, which their `token`/`base` inputs decide. The guard
            # now compares that pair too — see the `base:` input above.
            e2e:
              - 'apps/**/src/**'
              - 'apps/**/index.html'
              - 'apps/**/vite.config.ts'
              - 'apps/**/worker/**'
              - 'apps/**/alchemy.run.ts'
              - 'apps/**/tests/e2e/**'
              - 'apps/**/playwright.config.cjs'
              - 'apps/**/package.json'
              - 'packages/preview-seed/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy.yml'
            # Source the `check`/`unit` jobs actually cover: app code, configs that
            # change lint/typecheck/test behavior, every package.json, the lockfile,
            # and this workflow itself (so a CI edit keeps self-coverage). Doc/skill
            # paths (.claude/**, .decisions/**, .patterns/**, *.md) are excluded by
            # omission, so a docs-only PR leaves `code` false and both jobs skip.
            code:
              - 'apps/**/worker/**'
              - 'apps/**/src/**'
              - 'apps/**/tests/**'
              - 'apps/**/tsconfig*.json'
              - 'apps/**/vitest.config.ts'
              - 'apps/**/alchemy.run.ts'
              - 'packages/**'
              - 'infra/**'
              - 'biome.jsonc'
              - 'tsconfig*.json'
              - 'turbo.json'
              - 'pnpm-workspace.yaml'
              - '**/package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Source the `packages-tests` job covers (#760): every `packages/**`
            # file (a guard/tooling change) plus `infra/**` (the CI-credential stack's
            # permission-group guard, #1437), plus the lockfile and root configs
            # whose change can alter how the suites resolve/run, and this workflow
            # itself (so a CI edit keeps the gate self-covering). A docs/skills-only
            # or apps/web-only PR touches none of these → `packages` false → the job
            # skips (→ green, non-blocking). Narrower than `code`: an apps/web/src
            # change runs `unit` but legitimately not-applicable-skips `packages-tests`.
            #
            # Hook scripts (`claude-plugins/kampus-pipeline/hooks/**`) are listed so a
            # hook-only edit RUNS the golden real-payload handler tests that guard them
            # (create-worktree.hook.test.ts / command.hook.test.ts in packages-tests) —
            # ADR 0180. Without this, a change to a hook script skips `packages`, so the
            # blocking handler test never runs, and a broken hook ships green: exactly
            # the #2925 gap (a hook built to a fabricated payload passed every gate).
            packages:
              - 'packages/**'
              - 'infra/**'
              - 'claude-plugins/kampus-pipeline/hooks/**'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
            # Every workflow file actionlint lints (issue #568). A non-workflow PR
            # touches none of these → `workflows` false → the `actionlint` job skips
            # (→ green, non-blocking). Includes actions/ so a composite/local action's
            # YAML is covered too, since actionlint validates referenced local actions.
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json

      # Worker-relevance classifier (issue #1014, extended to the batch by #3079). Runs on
      # `pull_request` AND `merge_group` — a `push` has no base ref to diff and keeps the
      # full integration backstop. Emits `worker_relevant` — `false` ONLY when the whole
      # diff (incl. the `pnpm-lock.yaml` delta, attributed per importer block) is provably
      # confined to packages the worker never imports; any worker-affecting path, a shared
      # lockfile section, an unattributable diff, or any failure leaves it `true` (fail-safe
      # to running). Runs the zero-runtime-dep `@kampus/worker-relevance` bin directly — no
      # `pnpm install` (the `ci-required` idiom), so the always-on detector stays fast.
      # The `git diff` over the full-history checkout above gives the changed files + the
      # lockfile diff: on `pull_request` the range is the PR's merge-base...HEAD (three-dot);
      # on `merge_group` it is the batch's `base_sha..head_sha` (two-dot — see the range
      # assignment below for why two-dot is merge-base-safe here; ADR 0132), which OR's the
      # SAME classifier across every batched PR (#3079 defenses 1/2/4: real base ref,
      # OR-across-batch, exact classifier reuse).
      - name: Classify worker-relevance of the diff
        id: worker-relevance
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_REF: ${{ github.base_ref }}
          # The batch's real base + head (empty on `pull_request`). The queue builds the
          # batch on `base_sha` and `head_sha` is its prospective-merge tip (ADR 0132).
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "merge_group" ]; then
            # #3079 defense 3 (FAIL-SAFE TO RUNNING): any doubt about the batch's diff — an
            # empty base/head SHA, or an endpoint that can't be resolved in the checkout —
            # emits `worker_relevant=true` and runs integration; NEVER a skip on doubt, and
            # never a hard step failure (which would red the batch instead of running it).
            if [ -z "$MERGE_GROUP_BASE_SHA" ] || [ -z "$MERGE_GROUP_HEAD_SHA" ]; then
              echo "::warning::worker-relevance: merge_group base_sha/head_sha empty — fail-safe to running"
              echo "worker_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # The `fetch-depth: 0` checkout already carries the batch head's history (base_sha
            # is its ancestor); fetch defensively and fail SAFE to running if either endpoint
            # is still unresolvable, rather than let `set -e` red the batch.
            git fetch --no-tags --depth=1 origin "$MERGE_GROUP_BASE_SHA" "$MERGE_GROUP_HEAD_SHA" 2>/dev/null || true
            if ! git cat-file -e "${MERGE_GROUP_BASE_SHA}^{commit}" 2>/dev/null \
               || ! git cat-file -e "${MERGE_GROUP_HEAD_SHA}^{commit}" 2>/dev/null; then
              echo "::warning::worker-relevance: merge_group base/head SHA unresolvable in checkout — fail-safe to running"
              echo "worker_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # TWO-DOT (not three-dot): diff the batch's base and head TREES directly. A
            # merge_group's base_sha and head_sha need NOT share a merge base, so the three-dot
            # form (which requires one) exit-128'd the batch under `set -e` before any fail-safe
            # could run (#3083). head_sha is the prospective-merge tip that already contains
            # every batched PR, so `base..head` captures the whole batch's cumulative diff.
            range="$MERGE_GROUP_BASE_SHA..$MERGE_GROUP_HEAD_SHA"
          else
            # Full base fetch (no `--depth=1`): the `fetch-depth: 0` checkout above already
            # has HEAD's full history, but a shallow `--depth=1` base re-fetch can land a base
            # commit sharing NO ancestor with HEAD on a branch whose base drifted behind a
            # fast-moving `main`, so `git merge-base` came back empty under `set -e` and
            # false-red the whole `changes` job (issue #1154). A full base fetch restores a
            # real merge-base.
            git fetch --no-tags origin "$BASE_REF"
            # Fail SAFE to running, not red, if a merge-base still can't be found (orphan/grafted
            # history): an empty base degrades to the two-dot range against `origin/$BASE_REF`,
            # which yields a superset diff → `worker_relevant=true` (the step's existing
            # fail-safe-to-running stance), never a hard step failure.
            if base="$(git merge-base "origin/$BASE_REF" HEAD)" && [ -n "$base" ]; then
              range="$base...HEAD"
            else
              echo "::warning::worker-relevance: no merge-base with origin/$BASE_REF — degrading to a full diff (fail-safe to running)"
              range="origin/$BASE_REF..HEAD"
            fi
          fi
          # Guard the diff fail-safe-to-running: ANY failure — a no-merge-base endpoint pair, an
          # unresolvable SHA, any git error — degrades to running, never `set -e`-reds the batch.
          # Belt-and-suspenders with the two-dot switch above: the two-dot range already avoids
          # the merge-base requirement, and this catch keeps a future git edge case fail-safe too
          # (#3083). Runs in an `if` condition, which is exempt from `set -e`.
          if ! CHANGED_FILES="$(git diff --name-only --diff-filter=ACMRD "$range")" \
             || ! LOCKFILE_DIFF="$(git diff "$range" -- pnpm-lock.yaml)"; then
            echo "::warning::worker-relevance: git diff over '$range' failed — fail-safe to running"
            echo "worker_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export CHANGED_FILES LOCKFILE_DIFF
          node packages/worker-relevance/src/bin.ts

  check:
    name: lint / format / typecheck
    needs: changes
    # Run-ness is single-sourced from the `changes` job's `check_required` output
    # (mirrors `code == 'true'`); `ci-required` reads the SAME output to require this
    # job's success when `check_required` is true. Skipped → green, not blocking (no
    # required-status-check rule on `main`, so a legitimate skip never wedges a
    # docs-only PR).
    if: needs.changes.outputs.check_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `biome check` is lint + format in one pass (tabs/100-col/no-bracket-spacing).
      # `--reporter=github` (CI-only) emits `::error file=…,line=…::` workflow commands so a
      # lint/format failure renders as an inline annotation on the PR diff, not just buried log
      # text a repair agent must dig through (#3872). The flag lives here rather than in the root
      # `lint` script so local `pnpm lint` keeps the default human-readable reporter; this
      # mirrors that script's primary-checkout branch (`biome check .`) with the reporter added.
      - run: pnpm exec biome check --reporter=github .

      - run: pnpm typecheck

  unit:
    name: unit + client tests
    needs: changes
    # Same gate as `check`: skip (→ green, non-blocking) on a docs/skills-only PR.
    #
    # #771 evaluated PR-scoping this to the AC-relevant unit tests via `vitest run
    # --changed` (ADR 0082 blesses `--changed` for the unit tier — disjoint import
    # graphs). It is LEFT FULL deliberately: `--changed` is unsound HERE against
    # ADR 0092. Vitest forces `passWithNoTests=true` whenever `--changed` is set
    # (vitest 4 `resolveConfig`), so a `code`-true PR that edits a `worker/**`/`src/**`
    # module with NO unit test in its import graph runs ZERO tests and exits 0 — a
    # green that scanned nothing on a relevant change, exactly the silent-no-op
    # ADR 0092 forbids. The full run has no such hole. Sound PR-scoping needs a
    # zero-selection-is-FAIL wrapper (assert ≥1 spec selected on a `code`-true PR,
    # else fail) — that is gate-shaped (ADR 0092 fail-closed-on-zero-scope) and
    # belongs with the #738/#751 gate-owner, not guessed at here. Until then `unit`
    # runs FULL on every `code`-true PR + push (cheap: no DB, no creds).
    #
    # Shares `check`'s `code`-gated predicate, so it reads the same single-sourced
    # `check_required` output (#786) — `ci-required` requires this job's success when
    # `check_required` is true.
    if: needs.changes.outputs.check_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The `unit` vitest project (ADR 0082): node pool, no worker deploy, no
      # creds, no SQL engine. Fast signal over pure logic substituted directly at
      # the Drizzle seam — keyset/cursor-miss decisions, envelope shaping,
      # normalization, auth gates, Effect-DO builders over a DO-state fake.
      # Discovery-based across apps/ (the `pnpm --filter './packages/**'` idiom, ADR
      # 0057): runs each app's `test:unit`, so a second app is gated with no edit here.
      # Recursive `run` skips an app without the script — same posture as packages-tests.
      - run: pnpm --filter './apps/**' test:unit

      # The `client` vitest project (#1419, ADR 0082): the SPA component/DOM tier —
      # jsdom, renders the real React shells and queries the DOM for the `src/**/*.test.tsx`
      # suites (ui primitives, ReactionBar, PanoPost, Screen, the pages latches). It's a
      # sibling of `unit` (never `.tsx`), authored but ungated until now — CI ran only
      # `--project unit`, so a client-tier regression reached main on a green CI (#2266).
      # Folded into this same `code`-gated job: no worker deploy, no creds, and its fork
      # heap is already CI-capped (`--max-old-space-size=512`, vitest.config.ts). A
      # failing `.test.tsx` fails this job → UNIT_RESULT ≠ success → `ci-required` fails
      # closed, exactly as a `test:unit` failure does.
      - run: pnpm --filter './apps/**' test:client

  # The `packages/**` vitest suites (#760). Every workspace tooling/guard package
  # ships a `test` script (pipeline-cli — now the single home for the consolidated
  # guard/tooling logic — plus ci-required, …) but CI ran only `@kampus/web`'s — so a
  # regression in any gate guard's logic (incl. the #786 ci-required verdict
  # helper that runs HERE) shipped uncaught. This runs them as a REQUIRED gate.
  #
  # Discovery-based: the filter runs the `test` script of every package that
  # declares one, so a new `packages/<x>` with tests is gated with no workflow edit.
  # `@kampus/infra` (the CI-credential stack, #1437) is named explicitly alongside
  # the `./packages/**` glob so its permission-group guard suite runs here too.
  # These are node-pool unit suites (ADR 0082): no DB, no worker deploy, no creds —
  # fast (~7s, ~500 tests), no sharding. Run FULL (no `--changed`): the `packages`
  # path filter already scopes the JOB, and a full run has no zero-selection hole
  # (ADR 0092) — same posture as `unit`.
  #
  # Unlike `ci-required`'s zero-dep bin, the suites need their deps, so this job
  # installs (`--frozen-lockfile`). Run-ness is single-sourced from
  # `changes.packages_required` (mirrors the `packages` filter); `ci-required`
  # reads the SAME output to require this job's success when packages changed.
  packages-tests:
    name: packages unit tests
    needs: changes
    if: needs.changes.outputs.packages_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter './packages/**' --filter @kampus/infra run test

  skills:
    name: validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      # pnpm + node so validate-gate-path-drift.sh can read the §CP CONTROL_PLANE_RE from
      # its single-source const via `pipeline-cli control-plane-paths` (#2761) — this job
      # runs UNCONDITIONALLY (no path filter), so the const↔formats-doc drift check fires
      # on a formats-doc-only edit too, closing the merge_group-only gap that ejected #2673.
      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pure-bash guard, no toolchain: every .claude/skills/*/SKILL.md must carry
      # valid frontmatter (name + description, name == dir) or a skill silently
      # stops routing. Same script runs locally: `bash .claude/skills/validate-skills.sh`.
      - run: bash .claude/skills/validate-skills.sh

      # Portability safety net (ADR 0062 / 0083): assert every cycle-aware skill
      # (plan-epic/write-code/review-code/ship-it) no-ops gracefully with no
      # product-development-cycle.md — each cites the one canonical absence-probe
      # and an absent⇒no-op branch, and a hermetic doc-absent walkthrough holds.
      # Same script runs locally: `bash .claude/skills/validate-cycle-absence.sh`.
      - run: bash .claude/skills/validate-cycle-absence.sh

      # Present-path twin (issue #750, ADR 0091/0092): the absence script only ever
      # exercises the foreign-repo absent branch. This asserts phoenix's PRESENT path —
      # the cycle doc resolves `present` and each skill's present-branch action is wired
      # (plan-epic stamps, write-code ships dark, review-code gates, ship-it queues) — and
      # FAILS CLOSED on zero scope (missing doc ⇒ FAIL, never a silent no-op; ADR 0092).
      # Same script runs locally: `bash .claude/skills/validate-cycle-presence.sh`.
      - run: bash .claude/skills/validate-cycle-presence.sh

      # Gate-path drift guard (issue #720): assert the five CONTROL_PLANE_RE= copies
      # in ship-it/review-code/review-doc/review-skill/gh-issue-intake-formats are
      # byte-identical to the §CP canonical line, and that .claude/skills resolves to
      # marketplace.json's source + /skills. A rename of the plugin path otherwise
      # silently breaks all gate checks with no build-time failure.
      # Same script runs locally: `bash .claude/skills/validate-gate-path-drift.sh`.
      - run: bash .claude/skills/validate-gate-path-drift.sh

  # Reproducible workflow-YAML lint (issue #568). `.github/workflows/**` is the most
  # control-plane-sensitive, human-merged file class (ADR 0053), yet was validated
  # only by whoever happened to have actionlint installed locally — an ad-hoc,
  # non-reproducible install. This pins actionlint and feeds its result to
  # `ci-required`, so a malformed workflow (a bad `needs:`/`if:`, a typo'd job that
  # never feeds the gate) fails the required gate for everyone, no local install.
  #
  # Pinned for reproducibility the way the repo pins tooling: the version AND the
  # release-tarball SHA-256 are fixed here (the repo's action refs are pinned by tag;
  # a downloaded binary is pinned by tag + checksum so a re-tagged release can't slip
  # in). The hosted ubuntu runner ships shellcheck, so embedded `run:` scripts are
  # shell-linted too. Run-ness is single-sourced from `changes.workflows_required`;
  # `ci-required` reads the SAME output to require this job's success when a workflow
  # changed. A non-workflow PR skips → green (legit not-applicable, ADR 0092).
  actionlint:
    name: lint workflow YAML
    needs: changes
    if: needs.changes.outputs.workflows_required == 'true'
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install pinned actionlint
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl --fail --silent --show-error --location -o "$tarball" "$url"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum --check --status
          tar -xzf "$tarball" actionlint
          ./actionlint -version

      # actionlint globs .github/workflows/** itself; pass no files so a new workflow
      # is covered with no edit here. shellcheck (preinstalled on the runner) lints
      # the embedded `run:` scripts. A malformed workflow → non-zero exit → red gate.
      - name: Lint .github/workflows/**
        run: ./actionlint -color

  integration:
    name: integration tests
    needs: changes
    # Runs the full sweep when backend-ish paths changed (see `changes`) OR when
    # the `feature-complete` PR label is set (#771). The label is the forcing
    # function: a feature-complete PR runs the FULL integration sweep before merge
    # even if its changed paths didn't trip the backend filter — closing the window
    # where an un-swept backend regression rides in on a PR whose last commit looked
    # non-backend. A non-backend, non-flagged PR legitimately not-applicable-skips
    # (zero backend files = real empty scope, a legitimate skip, not a silent pass —
    # ADR 0092). `push` (main) keeps its existing backend-gated full run as the
    # post-merge backstop and is NOT gated on the flag (labels are a PR-only input).
    # Author gate (same as deploy.yml): this job injects real Cloudflare creds, so
    # it must never run for an outside contributor's PR. `push` always proceeds; PRs
    # run only for owners/org-members/collaborators. Mirrors the repo's
    # all_external_contributors fork-PR approval policy, made explicit.
    #
    # Run-ness AND required-ness are now single-sourced (#786, the required-ness half
    # deferred by #771): `changes.integration_required` is computed from the EXACT
    # inputs this `if:` used to inline — `(backend || feature-complete) && (push ||
    # author-allowed)` — so this job runs iff it should, and `ci-required` reads the
    # same output to require its success. The push-to-main backstop is preserved: on a
    # `push` event the author guard is satisfied by `github.event_name == 'push'` and
    # the label term is absent, so backend-changed pushes still run the full sweep,
    # flag-independent. A non-author/fork PR has `integration_required == false`, so
    # its secret-less skip stays a legitimate not-applicable PASS, never a FAIL.
    if: needs.changes.outputs.integration_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Persist turbo's local cache dir (`.turbo/cache`, gitignored) across runs so the
      # `Build SPA` step below is a cache HIT on an unchanged build instead of a cold
      # rebuild (#681). Turbo already content-hashes each task's inputs to decide reuse;
      # this cache only makes those prior outputs *reachable* on a fresh runner. Key on
      # the lockfile + all build source so an unchanged tree restores an exact-match
      # cache; `restore-keys` falls back to the newest prior cache on a partial change,
      # letting turbo reuse the unchanged tasks and rebuild only what moved. Caching
      # only — a cold-cache run produces byte-identical output.
      - name: Cache turbo build cache
        uses: actions/cache@v4.2.3
        with:
          path: .turbo/cache
          key: turbo-build-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/**/src/**', 'apps/**/worker/**', 'packages/**/src/**', 'turbo.json') }}
          restore-keys: |
            turbo-build-${{ runner.os }}-

      # The worker binds `assets: ./dist/client`; the integration deploy needs the
      # SPA shell to exist even though the suite only asserts over the API/fate
      # HTTP surface.
      - name: Build SPA
        run: pnpm --filter './apps/**' build

      # The `integration` vitest project (ADR 0082): each file deploys the alchemy
      # stack to real remote Cloudflare under its own per-file isolated stage via
      # `Test.make`, so D1 is ALWAYS real (no offline D1) and the suite needs real
      # creds. It runs FULL on every push — change-scoped `--changed` does not
      # narrow it (one worker = one Stack, so any worker change is in every
      # integration test's graph); its speed comes from per-file-stage parallelism,
      # not selection. On a dev machine creds resolve from a wrangler/alchemy
      # profile; a clean runner has none, so inject them from secrets.
      # ALCHEMY_PASSWORD encrypts the worker's secret_text bindings in localState;
      # BETTER_AUTH_SECRET is self-supplied by the harness when unset.
      - name: Integration tests
        run: pnpm --filter './apps/**' test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

      # preview-seed's `integration` tier (ADR 0082, #672) is the same real-remote-D1
      # `Test.make` shape as @kampus/web's above — its `node:sqlite` fake is gone, so it
      # needs the same Cloudflare creds. The no-creds `packages-tests` job runs only its
      # `test` (now unit-only), so this creds-bearing job is its only home.
      - name: Integration tests (preview-seed)
        run: pnpm --filter @kampus/preview-seed test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

      # moderator-grant's `integration` tier (ADR 0082, #930) is the same real-remote-D1
      # `Test.make` shape as preview-seed's above — its `node:sqlite` fake is gone (the
      # ban's last survivor), so it needs the same Cloudflare creds. The no-creds
      # `packages-tests` job runs only its `test` (now unit-only), so this creds-bearing
      # job is its only home.
      - name: Integration tests (moderator-grant)
        run: pnpm --filter @kampus/moderator-grant test:integration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}

  # The blocking e2e gate (epic #462): run Playwright against the per-PR preview
  # deploy so "CI green" means the frontend renders + the gated flows work
  # end-to-end, not just that unit/integration pass. All three Playwright projects
  # (in playwright.config.cjs) now gate `ci-required` in one blocking step:
  #   `unauth` (public read specs) + `setup`+`authed` (one real Better Auth sign-up
  #   captured into a storageState file the shared-session specs reuse, ADR 0085,
  #   #524) + `flows` (the authed WRITE flows — each drives its own sign-up; they
  #   catch behavioral races like the form-wipe bug #77/#438).
  #
  # The `flows` lane was formerly NON-BLOCKING (`continue-on-error`) while it failed
  # deterministically late under serial load. That was NOT a load wall: the real
  # causes were two user-visible data-path bugs — Family A (fresh-slug definition
  # card never persisting, fixed in #817/PR #821) and Family B (pano vote-count
  # scalar never reconciling, fixed in #818/PR #824). With both merged the lane is
  # green-stable (all 7 originally-failing specs pass), so #716 folds `flows` into
  # this blocking step — a `flows` failure now reddens `ci-required` and wedges
  # merge. This completes #525's full-suite-blocking ambition (epic #713 / #462).
  # The former FLOWS_GATE_PRECONDITION marker + its `skills`-job guard are retired
  # along with the flip.
  #
  # Target is the DEPLOYED preview, never a CI-booted workerd (the deploy already
  # runs in deploy.yml; #452's `spawn EBADF` is agent-sandbox-only, not Actions).
  # The preview URL + the stage's D1 id are produced by deploy.yml and surfaced in
  # the sticky `<!-- preview-deploy -->` PR comment — this job polls that comment
  # for the web line, seeds the D1, then points Playwright at the URL via
  # E2E_BASE_URL (#520's env-driven baseURL).
  #
  # Author/fork gate mirrors `integration` + deploy.yml: the seed injects real
  # Cloudflare creds, so it never runs for an outside contributor's PR. Path-gated
  # on `e2e` so a docs/skills-only PR skips → green (the `ci-required` aggregator
  # treats a skip as a pass).
  e2e:
    name: e2e (reads + authed + flows, blocking)
    needs: changes
    # Run-ness AND required-ness single-sourced (#786): `changes.e2e_required` mirrors
    # the EXACT inputs this `if:` inlined — `e2e-path && pull_request && author-allowed`
    # — and `ci-required` reads the same output. A fork/non-author or non-e2e-path PR
    # has `e2e_required == false`, so its skip stays a legitimate not-applicable PASS.
    if: needs.changes.outputs.e2e_required == 'true'
    runs-on: ubuntu-latest
    # Hang backstop (#660): the old `playwright install` hang stalled this job ~80min
    # with zero output before a human cancelled it. That install step is gone (the
    # container below prebakes the browsers), but cap the job anyway so ANY future
    # hang fails fast instead of burning the GH 6h default. Budget: container pull
    # (~3) + checkout/corepack/install (~3) + await-preview poll (10, its own
    # `core.setFailed` deadline) + seed (~1) + specs ~72s with one retry (~4) +
    # report upload (~1) ≈ 22min worst legit run; 25 leaves slack for a cold deploy
    # yet trips ~3× faster than the old stall.
    timeout-minutes: 25
    # Run in the Playwright-maintained image: chromium + headless-shell + ffmpeg
    # and all system deps are PREBAKED at /ms-playwright (PLAYWRIGHT_BROWSERS_PATH
    # is set in the image), so there's no `playwright install` download — which
    # hangs deterministically on the hosted runner (#522). Tag MUST match the
    # locked @playwright/test version (1.59.1) or the browsers won't match.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    permissions:
      contents: read
      pull-requests: read # read the sticky preview-deploy comment for URL + D1 id
    steps:
      - uses: actions/checkout@v4.2.2

      # The image ships Node 20+; `actions/setup-node` + `pnpm/action-setup` are
      # dropped (they'd fight the container's node). Corepack provisions the exact
      # pnpm pinned by the root `packageManager` field (pnpm@10.27.0).
      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      # deploy.yml runs as a SEPARATE workflow on the same PR event; there's no
      # cross-workflow `needs`, so synchronize on its artifact — the sticky
      # comment. This step gates readiness in TWO phases inside one ~10-min budget
      # (a cold alchemy deploy fits; a stuck/failed deploy times out → red
      # `ci-required`, never hangs forever):
      #   1. Discover the preview URL + `<!-- d1:<uuid> -->` token off the sticky
      #      comment deploy.yml posts.
      #   2. Health-probe that URL until the WORKER actually serves `/api/*`.
      # Phase 2 exists because the comment is only a PROXY for "deploy started": it
      # is posted ~43s before the worker goes live, so gating on the comment alone
      # ran the suite against a preview whose `/api/*` still fell through to the SPA
      # index → `sign-up/email failed: 404 <!DOCTYPE html>` → fixtures never seeded →
      # false-red on green PRs (#3016, surfaced on #3014). `GET /api/health` (ADR
      # 0156) is the readiness signal: the worker's typed-JSON endpoint answers with
      # `content-type: application/json` + a `flagshipReachable` body on BOTH 200-ok
      # and 503-degraded (Flagship unreachable is still the worker serving), whereas a
      # not-live preview returns the `text/html` SPA index — so readiness keys on
      # "the response came from the worker", not on a 2xx status.
      - name: Await preview URL + D1 id + live /api from deploy.yml
        id: preview
        uses: actions/github-script@v7.0.1
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = "<!-- preview-deploy -->";
            // phoenix is PUBLIC, so anyone can comment on a PR — but every lookup below reads
            // a TRUSTED CI artifact (deploy.yml's sticky comment): the preview URL + D1 token
            // e2e is pointed at, and the `:none` verdict that exits e2e as a not-applicable
            // PASS. Matching on body alone let a third party pre-post a forged marker — `find`
            // takes the FIRST match and deploy.yml posts ~43s in — and so steer e2e at an
            // attacker-controlled URL or skip the gate outright (#3740). The author is
            // verified against the live artifact, not assumed: deploy.yml comments through
            // github-script's default GITHUB_TOKEN, i.e. `github-actions[bot]` (user.type
            // `Bot`, id 41898282). GitHub rejects `[`/`]` in usernames, so no human account
            // can hold that login.
            const CI_COMMENT_AUTHOR = "github-actions[bot]";
            const isTrustedCi = (x) => x.user?.login === CI_COMMENT_AUTHOR && x.user?.type === "Bot";
            const deadline = Date.now() + 10 * 60 * 1000;
            const interval = 15000;
            // Match the web app's block in the sticky comment, capturing the URL
            // and the hidden d1 token deploy.yml emits for web only.
            const webRe = /<!-- preview-deploy:web -->\n[^\n]*?(https:\/\/[A-Za-z0-9.-]+\.workers\.dev)[^\n]*?<!-- d1:([0-9a-f-]+) -->/;
            // Optional, independent of the required URL+D1 match: the forced preview-flag
            // key set deploy.yml emits (issue #2951). Absent when no `preview-flag:<key>`
            // label forced anything, so it never gates the poll — only enriches the run env.
            const flagsRe = /<!-- preview-flags:([^>]*?) -->/;
            // deploy.yml's NEGATIVE verdict (#3722): no preview stack was minted for this
            // head, so there is nothing for e2e to run against. Bound to the head sha so a
            // stale verdict from an earlier push can never satisfy a later head.
            const noneRe = new RegExp(`<!-- preview-deploy:none head:${process.env.HEAD_SHA} -->`);
            const sleep = () => new Promise((r) => setTimeout(r, interval));

            // Phase 1 — discover the preview URL + D1 id from the sticky comment.
            let url, db, flags = "";
            let sawUntrusted = false;
            while (Date.now() < deadline) {
              const {data: comments} = await github.rest.issues.listComments({
                ...context.repo, issue_number: context.issue.number, per_page: 100,
              });
              const c = comments.find((x) => isTrustedCi(x) && x.body?.includes(marker));
              // A marker-bearing comment we IGNORED is either a forgery attempt or drift in
              // deploy.yml's posting identity. Either way the poll would otherwise just time
              // out with an unexplained "no preview was posted" — say which it is, once.
              if (!c && !sawUntrusted && comments.some((x) => x.body?.includes(marker))) {
                sawUntrusted = true;
                core.warning(
                  `ignoring a \`${marker}\` comment not authored by ${CI_COMMENT_AUTHOR}: the e2e ` +
                  "gate reads only the trusted CI identity's sticky comment (#3740). If deploy.yml " +
                  "now posts under a different identity, update CI_COMMENT_AUTHOR in this step.",
                );
              }
              // Read the negative verdict BEFORE the positive one: waiting out the deadline
              // for a preview deploy.yml has already declined to mint can only end in a red
              // `ci-required` on a PR with no defect in it (#3722, PR #3713). Exiting green
              // here is the same legitimate not-applicable PASS the job gets when
              // `e2e_required` is false — the only difference is that this PR reached the
              // job before the two workflows agreed. That disagreement is a CI-config
              // defect, so say so LOUDLY: this backstop must stay visible, never quietly
              // absorb the drift it exists to survive.
              if (c && noneRe.test(c.body)) {
                core.warning(
                  "deploy.yml published a NO-PREVIEW verdict for this head, yet e2e was required — " +
                  "ci.yml's `e2e` filter and deploy.yml's `deploy` filter disagreed about this diff. " +
                  "e2e is structurally not applicable (no preview URL will ever be posted), so this run " +
                  "exits as a not-applicable PASS instead of timing out. The disagreement itself is a CI " +
                  "config defect — fix the two `changes` jobs' filters/diff basis (#3722), don't rely on this exit.",
                );
                core.setOutput("skipped", "true");
                return;
              }
              const m = c && c.body.match(webRe);
              if (m) {
                url = m[1];
                db = m[2];
                const fm = c.body.match(flagsRe);
                flags = fm ? fm[1] : "";
                core.info(`preview URL posted: ${url} (D1 ${db}) — now probing /api/health for real API readiness`);
                break;
              }
              core.info("waiting for deploy.yml to post the web preview URL + D1 id…");
              await sleep();
            }
            if (!url) {
              core.setFailed(
                "timed out waiting for the preview deploy (URL + D1 id) from deploy.yml" +
                (sawUntrusted
                  ? ` — note: a \`${marker}\` comment WAS present but was ignored because ${CI_COMMENT_AUTHOR} did not author it (#3740)`
                  : ""),
              );
              return;
            }

            // Phase 2 — probe /api/health until the worker serves it (not the SPA
            // fallthrough), reusing the SAME deadline so total await stays ~10 min.
            const healthUrl = `${url.replace(/\/$/, "")}/api/health`;
            while (Date.now() < deadline) {
              try {
                const res = await fetch(healthUrl, {headers: {accept: "application/json"}});
                const ct = res.headers.get("content-type") || "";
                const body = await res.text();
                // Worker-up iff a JSON body carrying the health shape; a text/html
                // <!DOCTYPE html> (or a body without `flagshipReachable`) is the SPA
                // index — deploy not live yet. 503-degraded still passes (worker serving).
                if (ct.includes("application/json") && body.includes("flagshipReachable")) {
                  core.info(`preview API live: GET ${healthUrl} → ${res.status} ${ct}`);
                  core.setOutput("url", url);
                  core.setOutput("db", db);
                  core.setOutput("flags", flags);
                  core.info(`preview ready: ${url} (D1 ${db})${flags ? ` forced flags: ${flags}` : ""}`);
                  return;
                }
                core.info(`API not live yet: GET ${healthUrl} → ${res.status} ${ct || "(no content-type)"} — SPA-index fallthrough, backing off`);
              } catch (e) {
                core.info(`API probe errored (${e.message}) — deploy edge not up yet, backing off`);
              }
              await sleep();
            }
            core.setFailed(`preview URL ${url} was posted but GET ${healthUrl} never served the worker API (still SPA-index/unreachable) within the ~10-min budget — deploy is stuck or failed; refusing to run e2e against a not-live preview (#3016).`);

      # Seed the preview's (empty) D1 with the minimal sözlük + pano fixtures the
      # read specs assert on and the write/flow specs navigate from — e.g. the
      # `flows` specs that open "the first post/term" (#521). Idempotent upsert, so
      # a re-run is safe.
      # `skipped` means the step above read deploy.yml's no-preview verdict, so there is no
      # preview stack to seed or test — the remaining steps have no target (#3722).
      - name: Seed preview D1
        if: steps.preview.outputs.skipped != 'true'
        run: node packages/preview-seed/src/bin.ts run --database-id "${{ steps.preview.outputs.db }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # The full blocking gate: all three projects in one run. `authed` pulls in its
      # `setup` dependency automatically; `flows` (the authed write-flow lane) is now
      # folded in here (#716) — it went green-stable once Family A (#817) + Family B
      # (#818) landed. A failure in ANY project fails the job → reddens `ci-required`
      # → blocks merge. E2E_BASE_URL points the run at the preview (#520);
      # `--reporter=html,list` leaves a browsable report for the artifact below
      # (traces from the config's `trace: on-first-retry` + CI retry).
      - name: Run e2e specs (blocking — unauth + authed + flows)
        if: steps.preview.outputs.skipped != 'true'
        run: >-
          pnpm --filter './apps/**' exec playwright test
          --reporter=html,list
          --project unauth --project authed --project flows
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
          PLAYWRIGHT_HTML_OPEN: never
          # Privileged D1 REST access for the e2e promote helper (ADR 0137):
          # `promoteToYazar` runs an authenticated D1 `UPDATE user SET tier='yazar'`
          # against the preview stage's D1, mirroring the integration harness. The
          # account + token come from the same secrets the integration job uses; the
          # preview D1 uuid is the `<!-- d1:<uuid> -->` token deploy.yml surfaced,
          # already resolved above for the seed step (`steps.preview.outputs.db`).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          E2E_D1_DATABASE_ID: ${{ steps.preview.outputs.db }}
          # The forced preview-flag key set (comma-separated) deploy.yml forced ON in this
          # preview's Flagship app (issue #2951). Darkship OFF-assertion specs read this to
          # skip/invert against a forced-ON preview; empty when nothing was forced.
          E2E_FORCED_FLAGS: ${{ steps.preview.outputs.flags }}

      # Upload the report whenever the run completed (pass or fail), so a red run's
      # traces survive for triage; `!cancelled()` keeps it from skipping on failure,
      # and `if-no-files-found` ignores the all-clean case.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4.4.3
        with:
          name: playwright-report
          path: |
            apps/**/playwright-report/
            apps/**/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # The one always-on context safe to mark required on `main` (#461/#402). The
  # code gates above (`check`/`unit`/`integration`/`e2e`) are conditional: each
  # skips on a PR whose changed paths it doesn't cover (docs/skills-only,
  # non-backend, external-author). Listing a *conditional* context in a ruleset's
  # required_status_checks wedges those PRs — GitHub's skipped-as-success handling
  # for `if:`+`needs:` jobs is unreliable across configs. This aggregator always
  # reports (`if: !cancelled()` keeps it from skipping when a dep skips) and is the
  # one context the ruleset requires, transitively enforcing the conditional checks.
  #
  # FLAG/PATH-AWARE required-ness (#786, ADR 0092): treating EVERY `skipped` dep as a
  # pass is a silent-no-op — a gating job that SHOULD have run but was skipped (a
  # misconfigured `if:`, a path-filter miss, a flag not honored) read as a free PASS.
  # So per job this asserts against the SAME `changes.*_required` single source its
  # own `if:` consumes: should-run ⇒ the result MUST be `success` (a `skipped` or any
  # non-success FAILS closed); should-not-run ⇒ a `skipped` is a legitimate
  # not-applicable PASS (`success` is fine too). Required-ness and run-ness therefore
  # read from ONE place (no predicate re-derivation here, no drift), and the verdict
  # per job is EMITTED to the log (ADR 0092 §1 "emit what you scanned"), so a quietly
  # -skipped required job is visible in the run, not only in the exit code.
  #
  # The verdict logic is the PURE, UNIT-TESTED `ci-required` core, inlined into
  # pipeline-cli (#3802) — `node packages/pipeline-cli/src/tools/ci-required/bin.ts`
  # reads the `needs.*` env below and exits 0/1. It is a ZERO-RUNTIME-DEPENDENCY plain-Node
  # module (node strips the TS types natively), so this gate job runs only
  # checkout + setup-node + node — NO `pnpm install` — keeping the always-on
  # aggregator fast. Its full matrix (the 4 integration scenarios, the packages-tests
  # required/legit-skip/fail cases, the fork skip, a genuine failure, and the
  # changes-job-itself-failed fail-closed case) lives in ci-required.unit.test.ts,
  # run by the `packages-tests` lane (which gates all `packages/**` suites, #760).
  ci-required:
    name: ci-required
    needs: [changes, check, unit, packages-tests, actionlint, integration, e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json

      - name: Require should-have-run gating jobs to have passed (skip is legit only when not required)
        env:
          # `check` and `unit` share the single-sourced `check_required`; integration
          # and e2e read their own. Pair each job's should-run with its result so the
          # helper reads required-ness and run-ness from ONE source per job.
          CHANGES_RESULT: ${{ needs.changes.result }}
          CHECK_REQUIRED: ${{ needs.changes.outputs.check_required }}
          INTEGRATION_REQUIRED: ${{ needs.changes.outputs.integration_required }}
          E2E_REQUIRED: ${{ needs.changes.outputs.e2e_required }}
          PACKAGES_REQUIRED: ${{ needs.changes.outputs.packages_required }}
          WORKFLOWS_REQUIRED: ${{ needs.changes.outputs.workflows_required }}
          CHECK_RESULT: ${{ needs.check.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          PACKAGES_RESULT: ${{ needs.packages-tests.result }}
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: node packages/pipeline-cli/src/tools/ci-required/bin.ts
