name: Deploy

# Adapted from #19 (Can Sirin / @cansirin) — alchemy-provisioned CI/CD.
# Fans out over every app under apps/ via the `app` matrix (ADR 0057): phoenix is
# multi-app/multi-worker, each app its own package + alchemy stack + per-app stage,
# reusing the account-global state store + the four CI secrets (no second bootstrap).

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# The stage name keys an isolated copy of one app's stack (worker + D1 + DOs).
# Pull requests → `pr-<n>`; pushes to main (the only push trigger) → `prod`.
env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'prod' }}

jobs:
  deploy:
    # Defense-in-depth: never run a secret-bearing deploy for a fork PR. A
    # same-repo (non-fork) PR can only be opened by someone with push access, so
    # it's inherently trusted to run with secrets; a fork PR is the real
    # secret-leak risk. The repo's fork-PR approval policy already gates forks
    # (all_external_contributors → manual "Approve and run"), but encoding the
    # fork gate here makes it explicit and survives any settings drift. `push`
    # (prod, main-only) always proceeds; PRs run only when the head repo IS this
    # repo (not a fork). This replaces the old `author_association` gate, whose
    # webhook-payload value lagged org-membership visibility and skipped the
    # deploy on maintainer same-repo PRs (issue #293).
    if: >-
      github.event.action != 'closed' &&
      (github.event_name == 'push' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the preview-URL comment on PRs
    strategy:
      # Each app is an independent worker + stack (ADR 0057) — one app's deploy
      # failing must not cancel the other's. `fail-fast: false` keeps both running.
      fail-fast: false
      matrix:
        include:
          # `app` is the apps/ dir; `pnpm-name` is its workspace package.
          # `needs-auth` says whether the app's worker binds BETTER_AUTH_SECRET:
          # @kampus/web has auth (config.ts reads it `Effect.orDie`), so its
          # deploy/destroy passes the secret. A future auth-less app would set
          # `needs-auth: false` so its deploy never requires the secret (ADR 0057).
          - app: web
            pnpm-name: "@kampus/web"
            needs-auth: true
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          # On a `pull_request` event we deliberately keep checkout's default
          # `refs/remotes/pull/N/merge` (the PR merged into base `main`) so the
          # deploy exercises the merged tree, surfacing main-drift/conflicts the
          # bare head SHA wouldn't. `fetch-depth: 0` makes that merge commit's
          # PARENTS reachable, which the stale-merge-ref guard below needs to
          # read `HEAD^2` and to recompute the merge locally if it's stale.
          fetch-depth: 0

      # Reject (and repair) a stale pull/N/merge ref before building (issue #917).
      # In the first minutes after a push — exactly when CI fires — GitHub's
      # computed `pull/N/merge` can still be the merge of the PR's PRIOR head into
      # main, so the default checkout builds the WRONG commit and false-FAILs code
      # that is green at head (confirmed on PR #914: head 0a7a463 was green, but
      # `pull/914/merge` was the merge of the already-superseded bca1889).
      #
      # The merge commit's second parent IS the PR head it was computed against, so
      # `HEAD^2 == github.event.pull_request.head.sha` is the exact staleness test.
      # On a match we build the merge ref unchanged (full main-drift coverage kept).
      # On a mismatch the ref is stale: instead of failing the run (which would only
      # self-correct on a re-run), we recompute the SAME merged-into-main tree
      # LOCALLY from the event's known head SHA + the live base tip — preserving
      # merged-into-main semantics while rejecting the stale build. `push`-to-main
      # (prod) has no merge ref, so this step is `pull_request`-only and the prod
      # path is untouched.
      - name: Guard against a stale pull/N/merge ref (PR only)
        if: github.event_name == 'pull_request'
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          second_parent="$(git rev-parse HEAD^2)"
          if [ "$second_parent" = "$PR_HEAD_SHA" ]; then
            echo "merge ref is fresh: HEAD^2 ($second_parent) == event head SHA ($PR_HEAD_SHA)"
            exit 0
          fi
          echo "::warning::stale pull/N/merge — HEAD^2 ($second_parent) != event head SHA ($PR_HEAD_SHA); recomputing the merge locally"
          # Fetch the exact head the event fired for and the live base tip, then
          # rebuild the merge deterministically. `--no-edit` keeps it non-interactive;
          # a real merge conflict still fails the step (that conflict IS the main-drift
          # signal the merge ref exists to surface — preserved, not papered over).
          git fetch --no-tags --depth=1 origin "$PR_HEAD_SHA"
          git fetch --no-tags --depth=1 origin "$PR_BASE_REF"
          git -c user.name=ci -c user.email=ci@local checkout -B deploy-merge "origin/$PR_BASE_REF"
          git -c user.name=ci -c user.email=ci@local merge --no-edit "$PR_HEAD_SHA"
          rebuilt_second_parent="$(git rev-parse HEAD^2)"
          if [ "$rebuilt_second_parent" != "$PR_HEAD_SHA" ]; then
            echo "::error::failed to rebuild merge against event head SHA ($PR_HEAD_SHA); refusing to deploy the wrong commit"
            exit 1
          fi
          echo "rebuilt merge of head $PR_HEAD_SHA into base $PR_BASE_REF"

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Map the alchemy stage name → the deploy ENVIRONMENT class (ADR 0088) via the
      # single owner of that map, apps/web/worker/environment.ts (`environmentForStage`),
      # so the `prod`→`production` spelling lives in ONE place instead of being inlined in
      # a YAML expression here (#1433). node strips the module's types; it has no runtime
      # deps, so this resolves against the checked-out source alone. Three classes: `prod`
      # → `production`; every per-PR `pr-<n>` preview → `preview`, which trusts its OWN
      # `*.kampusinfra.workers.dev` served origin for better-auth (fixes #704 — a preview
      # labelled `development` hardcoded localhost origins and rejected real browser
      # sign-up as "Invalid origin"). `development` is local `alchemy dev` only (set in
      # `.env`), never a deployed stage. Sets ENVIRONMENT in $GITHUB_ENV for the deploy step.
      - name: Resolve deploy ENVIRONMENT from stage
        run: |
          set -euo pipefail
          ENVIRONMENT="$(node --eval "import('./apps/web/worker/environment.ts').then((m) => process.stdout.write(m.environmentForStage(process.env.STAGE)))")"
          echo "stage '$STAGE' → ENVIRONMENT '$ENVIRONMENT'"
          echo "ENVIRONMENT=$ENVIRONMENT" >> "$GITHUB_ENV"

      # The SPA is a plain Vite build; the worker uploads `dist/client` via its
      # `assets` prop. `alchemy deploy` does not drive Vite for phoenix's shape.
      - name: Build SPA (${{ matrix.app }})
        run: pnpm --filter ${{ matrix.pnpm-name }} build

      # `exec alchemy` forwards `--stage`/`--yes` to the alchemy CLI. A bare
      # `pnpm --filter <app> deploy --stage …` makes *pnpm* eat the flags
      # ("Unknown options: 'stage', 'yes'"). `--yes` skips the interactive plan
      # approval (CI would otherwise hang); `--stage` selects the isolated copy.
      # Creds come from the secrets `infra/ci-credentials/github.ts` provisions
      # (run via `pnpm --filter @kampus/infra exec alchemy deploy github.ts`); BETTER_AUTH_SECRET
      # is passed only for apps whose worker binds it (matrix.needs-auth).
      - name: Deploy ${{ matrix.app }} (stage ${{ env.STAGE }})
        id: deploy
        run: |
          set -o pipefail
          pnpm --filter ${{ matrix.pnpm-name }} exec alchemy deploy --stage "$STAGE" --yes | tee deploy.log
          # alchemy has no structured URL output, so scrape the worker URL it
          # prints (`url: 'https://…workers.dev'`). `set -o pipefail` keeps the
          # deploy's exit code through the `tee` so a failed deploy still fails.
          echo "url=$(grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' deploy.log | tail -1)" >> "$GITHUB_OUTPUT"
        env:
          CI: "true"
          # ENVIRONMENT comes from the "Resolve deploy ENVIRONMENT from stage" step above
          # (via $GITHUB_ENV) — owned by apps/web/worker/environment.ts, not inlined here (#1433).
          # CI-secret roster: the four secrets below are enumerated canonically in
          # infra/ci-credentials/github.ts (the provisioner that mints/pushes them);
          # keep this set in sync with that roster (#1432).
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          # The session-signing secret, bound only by apps with auth. `config.ts`
          # reads it via `Config.redacted(ENV_BINDINGS.betterAuthSecret)` → a `secret_text`
          # binding the worker reads at runtime; the value must be present at deploy
          # time. A future auth-less app sets `needs-auth: false` and never reads it.
          BETTER_AUTH_SECRET: ${{ matrix.needs-auth && secrets.BETTER_AUTH_SECRET || '' }}

      # Resolve the deployed web stage's D1 UUID so the e2e job (ci.yml, #522) can
      # seed it before running the unauth read specs. The seed needs the physical
      # database id; alchemy's per-stage D1 carries a random 16-char suffix
      # (`createPhysicalName`), so the id is NOT reconstructable from the stage
      # name alone and must be looked up here, where the creds + stage are in hand.
      # Alchemy names the D1 `${stack}-${id}-${stage}-${suffix}` then sanitizes it
      # (`_`→`-`), so the id "phoenix_db" becomes "phoenix-db" in the physical name:
      # `phoenix-phoenix-db-<stage>-…` (alchemy.run.ts stack "phoenix"; resources.ts
      # D1 id "phoenix_db"). Do NOT "fix" the prefix back to `phoenix_db` — the CF
      # `/d1/database?name=` filter is a substring match, so this prefix uniquely
      # selects this stage's database. web-only (`@kampus/web` is the app the e2e
      # specs target) and PR-only (no preview seed on prod).
      - name: Resolve web preview D1 id (${{ matrix.app }})
        id: d1
        if: github.event_name == 'pull_request' && matrix.app == 'web'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_NAME_PREFIX: phoenix-phoenix-db-${{ env.STAGE }}-
        run: |
          set -euo pipefail
          resp="$(curl -sf -G \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --data-urlencode "name=${DB_NAME_PREFIX}")"
          # The prefix-filtered list should hold exactly one match for this stage.
          uuid="$(echo "$resp" | jq -r --arg p "$DB_NAME_PREFIX" \
            '[.result[] | select(.name | startswith($p))] | (.[0].uuid // "")')"
          if [ -z "$uuid" ] || [ "$uuid" = "null" ]; then
            echo "::error::could not resolve D1 uuid for prefix '${DB_NAME_PREFIX}'"; exit 1
          fi
          echo "uuid=$uuid" >> "$GITHUB_OUTPUT"

      # Post (or update) a sticky comment carrying EVERY app's preview URL on PRs.
      # The outer `<!-- preview-deploy -->` marker makes the comment sticky; a
      # per-app `<!-- preview-deploy:<app> -->` line lets each matrix job upsert
      # only its own URL into the shared comment. Parallel matrix jobs both edit
      # the one comment, so the upsert is an optimistic read-modify-write retried
      # on conflict (ETag 409 / lost update). Skipped on pushes to main (`prod`).
      - name: Comment preview URL (${{ matrix.app }})
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7.0.1
        env:
          APP: ${{ matrix.app }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          STAGE_NAME: ${{ env.STAGE }}
          # web-only: the e2e job (ci.yml, #522) parses this token to seed the D1.
          DB_ID: ${{ steps.d1.outputs.uuid }}
        with:
          script: |
            const marker = "<!-- preview-deploy -->";
            const app = process.env.APP;
            const appMark = `<!-- preview-deploy:${app} -->`;
            const sha = context.sha.slice(0, 7);
            // A hidden, machine-parseable token the e2e job reads (#522). Only web
            // resolves a D1 id; other apps omit it. Kept in an HTML comment so it
            // doesn't clutter the human-facing line.
            const dbId = process.env.DB_ID || "";
            const dbToken = dbId ? ` <!-- d1:${dbId} -->` : "";
            const appLine = `${appMark}\n`
              + `- **${app}** — Stage \`${process.env.STAGE_NAME}\` → ${process.env.PREVIEW_URL} `
              + `<sub>(${sha})</sub>${dbToken}`;

            // Replace this app's block in the body (or append it), preserving any
            // other app's block another matrix job may have already written.
            const upsert = (body) => {
              const header = `${marker}\n### 🚀 Preview deployed`;
              let b = body && body.includes(marker) ? body : header;
              const re = new RegExp(
                `${appMark.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")}\\n[^\\n]*`,
              );
              return re.test(b) ? b.replace(re, appLine) : `${b}\n${appLine}`;
            };

            // Retry the read-modify-write: a sibling matrix job may create or
            // update the same comment between our read and write, so re-list and
            // re-resolve `existing` each attempt — a leg that lost the create
            // race observes the sibling's comment on its next pass and falls into
            // the update branch instead of creating a duplicate (issue #273).
            for (let attempt = 0; attempt < 5; attempt++) {
              try {
                const {data: comments} = await github.rest.issues.listComments({
                  ...context.repo, issue_number: context.issue.number, per_page: 100,
                });
                const existing = comments.find((c) => c.body?.includes(marker));
                if (existing) {
                  await github.rest.issues.updateComment({
                    ...context.repo, comment_id: existing.id, body: upsert(existing.body),
                  });
                } else {
                  await github.rest.issues.createComment({
                    ...context.repo, issue_number: context.issue.number, body: upsert(""),
                  });
                }
                return;
              } catch (err) {
                if (attempt === 4) throw err;
                await new Promise((r) => setTimeout(r, 500 * (attempt + 1)));
              }
            }

  cleanup:
    # Same fork gate as `deploy` — a fork PR never deployed a stage, so there's
    # nothing to tear down, and we don't run secret-bearing `destroy` for it
    # either. Same-repo (non-fork) closed PRs proceed (issue #293).
    if: >-
      github.event_name == 'pull_request' && github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # update the preview comment to "torn down"
    strategy:
      # Tear down every app's preview stage; one destroy failing must not skip
      # the other (a half-torn-down PR would leak a worker + D1 + DOs).
      fail-fast: false
      matrix:
        include:
          - app: web
            pnpm-name: "@kampus/web"
            needs-auth: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # STAGE is only ever `pr-<n>` in this job (it runs on closed PRs), but fail
      # loudly rather than ever let a destroy reach the prod stage.
      - name: Safety check — never destroy prod
        run: |
          if [ "$STAGE" = "prod" ]; then
            echo "ERROR: refusing to destroy the prod stage in cleanup"
            exit 1
          fi

      # Tears down one app's isolated preview stack (worker + D1 + DOs). `destroy`
      # loads `alchemy.run.ts`, which builds the worker layer → for apps with auth
      # that needs BETTER_AUTH_SECRET (config.ts reads it `Effect.orDie`) just like
      # the deploy; a future auth-less app never binds it (matrix.needs-auth).
      - name: Destroy ${{ matrix.app }} preview stage ${{ env.STAGE }}
        run: pnpm --filter ${{ matrix.pnpm-name }} exec alchemy destroy --stage "$STAGE" --yes
        env:
          CI: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ matrix.needs-auth && secrets.BETTER_AUTH_SECRET || '' }}

      # Kill the false-green (issue #813). `alchemy destroy` deletes only what its STATE
      # records for the stage: when no state is found for `pr-<n>` the plan is empty
      # (`Plan: 0 to delete`) and the command STILL exits 0 (alchemy
      # `Cli/commands/deploy.js` → `execStack({destroy:true})`: an empty `deletions` set
      # makes `hasChanges` false, so it prints nothing and returns success). A green
      # destroy step therefore does NOT prove the worker is gone — that gap is exactly how
      # 33 `pr-<n>` workers leaked while every cleanup job reported `success`. Verify the
      # teardown actually happened: list this stage's worker scripts by their alchemy
      # physical-name prefix and FAIL the job if any survive, so a green cleanup reliably
      # means torn down and any future state-loss regression surfaces loudly instead of
      # accumulating an unnoticed leak. The prefix is the alchemy physical name
      # `${stack}-${id}-${stage}-` = `phoenix-phoenix-${STAGE}-` (the scheme the "Resolve
      # web preview D1 id" step in the deploy job documents; see apps/web/alchemy.run.ts).
      # The trailing dash anchors the stage so `pr-12-` never matches `pr-120-…`. Runs only
      # on a SUCCESSFUL destroy (default `if: success()`) — a destroy that already errored
      # reds the job on its own; this step catches the SILENT exit-0 no-op. STAGE is always
      # `pr-<n>` here (cleanup is closed-PR-only), so this never inspects prod.
      - name: Verify teardown — no surviving preview worker (${{ matrix.app }})
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME_PREFIX: phoenix-phoenix-${{ env.STAGE }}-
        run: |
          set -uo pipefail
          listed=""
          survivors=""
          # Retry the list to absorb Cloudflare's eventual-consistency window after the
          # delete (a just-deleted script can linger in the list API for a few seconds).
          for attempt in 1 2 3 4 5; do
            if resp="$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")"; then
              listed=yes
              survivors="$(echo "$resp" | jq -r --arg p "$WORKER_NAME_PREFIX" \
                '[.result[]?.id // empty | select(startswith($p))] | .[]')"
              [ -z "$survivors" ] && break
            fi
            sleep $((attempt * 3))
          done
          # A list that never succeeded must NOT pass silently (that would re-introduce a
          # false-green) — fail so the verification gap is visible.
          if [ -z "$listed" ]; then
            echo "::error::could not list workers to verify teardown for stage ${STAGE}"
            exit 1
          fi
          if [ -n "$survivors" ]; then
            echo "::error::teardown FALSE-GREEN (issue #813) — worker(s) survived destroy for stage ${STAGE}:"
            echo "$survivors"
            echo "alchemy destroy reported success but left a live worker. Failing so the leak surfaces."
            exit 1
          fi
          echo "teardown verified: no worker prefixed '${WORKER_NAME_PREFIX}' survives for stage ${STAGE}"

      # Flip the sticky preview comment to "torn down" so it never points at a
      # destroyed stage. Each matrix job rewrites only its own app line; the last
      # job to run leaves the comment reading "torn down" for both apps.
      # `always()`: update it even if the destroy step errored.
      - name: Update preview comment (torn down, ${{ matrix.app }})
        if: always()
        uses: actions/github-script@v7.0.1
        env:
          APP: ${{ matrix.app }}
          STAGE_NAME: ${{ env.STAGE }}
        with:
          script: |
            const marker = "<!-- preview-deploy -->";
            const app = process.env.APP;
            const appMark = `<!-- preview-deploy:${app} -->`;
            const appLine = `${appMark}\n`
              + `- **${app}** — Stage \`${process.env.STAGE_NAME}\` torn down.`;

            const upsert = (body) => {
              const header = `${marker}\n### 🧹 Preview torn down`;
              let b = body && body.includes(marker) ? body : header;
              const re = new RegExp(
                `${appMark.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")}\\n[^\\n]*`,
              );
              return re.test(b) ? b.replace(re, appLine) : `${b}\n${appLine}`;
            };

            // Re-list and re-resolve `existing` each attempt (same shape as the
            // deploy step's fix, issue #273): a sibling matrix job may create the
            // sticky comment between our reads, so re-resolving lets a leg that
            // saw "no comment yet" pick it up on retry instead of giving up.
            for (let attempt = 0; attempt < 5; attempt++) {
              try {
                const {data: comments} = await github.rest.issues.listComments({
                  ...context.repo, issue_number: context.issue.number, per_page: 100,
                });
                const existing = comments.find((c) => c.body?.includes(marker));
                if (!existing) return;
                await github.rest.issues.updateComment({
                  ...context.repo, comment_id: existing.id, body: upsert(existing.body),
                });
                return;
              } catch (err) {
                if (attempt === 4) throw err;
                await new Promise((r) => setTimeout(r, 500 * (attempt + 1)));
              }
            }
