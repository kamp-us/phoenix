name: Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 25.2.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @phoenix/web build

      - name: Deploy to production
        run: pnpm --filter @phoenix/web exec wrangler deploy --config wrangler.jsonc --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 25.2.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @phoenix/web build

      - name: Deploy to staging
        run: pnpm --filter @phoenix/web exec wrangler deploy --config wrangler.jsonc --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 25.2.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @phoenix/web build

      - name: Deploy PR preview
        id: deploy
        run: |
          pnpm --filter @phoenix/web exec wrangler deploy \
            --config wrangler.jsonc \
            --env test \
            --name phoenix-pr-${{ github.event.pull_request.number }}
          echo "url=https://phoenix-pr-${{ github.event.pull_request.number }}.${CF_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_SUBDOMAIN: ${{ vars.CF_WORKERS_SUBDOMAIN }}

      - name: Comment preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-url
          message: |
            **Preview:** ${{ steps.deploy.outputs.url }}

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview worker
        run: npx wrangler delete --name phoenix-pr-${{ github.event.pull_request.number }} --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
