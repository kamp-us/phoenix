# Publishes @kampus/decisions-index to npm on a human-cut GitHub Release tagged
# `decisions-index-v*` (ADR 0075, following 0064's epic-ledger pattern). Auth is
# OIDC Trusted Publishing — no NPM_TOKEN secret: `id-token: write` mints a
# short-lived per-run credential, and provenance is generated automatically. A
# guard fails the run if the tag version and the package.json version disagree, so
# a mistagged release never publishes.
#
# Publish is `pnpm publish` (not `npm publish`): pnpm has native OIDC
# trusted-publishing support and resolves `catalog:`/`workspace:` specifiers into
# the tarball at pack time, so the source package.json keeps the pnpm catalog as
# the single source of truth. No `npm install -g npm@latest` step is needed.
#
# Prerequisite (human, one-time): the @kampus npm org/scope must exist and this
# repo + workflow must be registered as a Trusted Publisher for
# @kampus/decisions-index on npmjs.com, after a one-time manual bootstrap publish.
# Until then this workflow fails closed.
name: publish-decisions-index

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish @kampus/decisions-index to npm
    runs-on: ubuntu-latest
    # Only fire for this package's release tags; the `release` event has no tag
    # filter, so gate the job on the tag prefix here.
    if: startsWith(github.event.release.tag_name, 'decisions-index-v')
    steps:
      - uses: actions/checkout@v4.2.2

      # Pin pnpm to 10.27.0 — pnpm 11 must NOT be used: it has a known OIDC
      # trusted-publishing 404 regression (pnpm#11513).
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 10.27.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 26.2.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Tag is `decisions-index-v<version>`; strip the prefix and compare against
      # the package.json version. A mismatch fails the run before any publish.
      - name: Guard — release tag must match package.json version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#decisions-index-v}"
          PKG_VERSION="$(node -p "require('./packages/decisions-index/package.json').version")"
          echo "tag version:        $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::release tag ($TAG_VERSION) does not match packages/decisions-index/package.json version ($PKG_VERSION) — refusing to publish"
            exit 1
          fi

      - name: Typecheck decisions-index
        run: pnpm --filter @kampus/decisions-index typecheck

      # The package ships compiled ESM JS (bin/exports point at dist/, files: [dist]),
      # never raw .ts — Node refuses to strip types under node_modules, so a source-only
      # tarball is dead-on-arrival for any consumer. Build dist/ before publish;
      # prepublishOnly also runs it, but an explicit step makes the gate visible.
      - name: Build decisions-index (compile src/ → dist/)
        run: pnpm --filter @kampus/decisions-index build

      # Publish ONLY this package, from its own dir. No NPM_TOKEN — pnpm's native
      # OIDC trusted publishing supplies the credential per run and generates
      # provenance automatically. pnpm resolves catalog:/workspace: specifiers into
      # the tarball at pack time, so the source package.json keeps catalog: deps.
      - name: Publish to npm (pnpm OIDC trusted publishing + automatic provenance)
        working-directory: packages/decisions-index
        run: pnpm publish --access public --no-git-checks
