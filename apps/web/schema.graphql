type Comment {
  author: String!
  body: String!
  createdAt: String!
  id: ID!
  parentId: ID
  score: Int!
}

type Definition {
  author: String!
  body: String!
  createdAt: String!
  id: ID!
  score: Int!
  updatedAt: String!
}

type Health {
  environment: String!
  status: String!
}

type Mutation {
  voteOnComment(input: VoteInput!): VoteResult!
  voteOnPost(input: VoteInput!): VoteResult!
}

type Post {
  author: String!
  body: String
  commentCount: Int!
  createdAt: String!
  host: String
  id: ID!
  score: Int!
  slug: String
  tags: [Tag!]!
  title: String!
  url: String
}

enum PostSort {
  discuss
  hot
  new
  top
}

type Query {
  health: Health!
  me: User
  post(idOrSlug: String!): Post
  postComments(postId: String!): [Comment!]!
  posts(host: String, limit: Int, sort: PostSort): [Post!]!
  term(slug: String!): Term
  terms(limit: Int, sort: TermSort): [Term!]!
}

type Tag {
  kind: String!
  label: String!
}

type Term {
  count: Int!
  definitions: [Definition!]!
  excerpt: String
  firstAt: String
  id: ID!
  lastEdit: String
  slug: String!
  title: String!
  totalScore: Int!
}

enum TermSort {
  popular
  recent
}

type User {
  email: String!
  id: ID!
  image: String
  name: String
}

input VoteInput {
  targetId: ID!
  value: Int!
}

type VoteResult {
  score: Int!
}