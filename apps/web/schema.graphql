type Comment {
  author: String!
  body: String!
  createdAt: String!
  id: ID!
  parentId: ID
  score: Int!
}

type Definition {
  author: String!
  authorId: ID!
  body: String!
  createdAt: String!
  id: ID!
  myVote: Int
  score: Int!
  updatedAt: String!
}

type Health {
  environment: String!
  status: String!
}

type Mutation {
  addComment(body: String!, parentId: ID, postId: ID!): Comment!
  addDefinition(body: String!, termSlug: String!, termTitle: String): Definition!
  deleteDefinition(id: ID!): String!
  deletePost(id: ID!): String!
  editDefinition(body: String!, id: ID!): Definition!
  editPost(body: String, id: ID!, title: String): Post!
  retractDefinitionVote(definitionId: ID!): Definition!
  retractPostVote(postId: ID!): Post!
  setUsername(value: String!): User!
  submitPost(body: String, tags: [TagInput!]!, title: String!, url: String): Post!
  voteDefinition(definitionId: ID!): Definition!
  voteOnComment(input: VoteInput!): VoteResult!
  voteOnPost(postId: ID!): Post!
}

type Post {
  author: String!
  authorId: ID!
  body: String
  commentCount: Int!
  createdAt: String!
  host: String
  id: ID!
  myVote: Int
  score: Int!
  slug: String
  tags: [Tag!]!
  title: String!
  url: String
}

enum PostSort {
  discuss
  hot
  new
  top
}

type Query {
  health: Health!
  me: User
  post(idOrSlug: String!): Post
  postComments(postId: String!): [Comment!]!
  posts(host: String, limit: Int, sort: PostSort): [Post!]!
  term(slug: String!): Term
  terms(limit: Int, sort: TermSort): [Term!]!
}

type Tag {
  kind: String!
  label: String!
}

input TagInput {
  kind: String!
  label: String
}

type Term {
  count: Int!
  definitions: [Definition!]!
  excerpt: String
  firstAt: String
  id: ID!
  lastEdit: String
  slug: String!
  title: String!
  totalScore: Int!
}

enum TermSort {
  popular
  recent
}

type User {
  email: String!
  id: ID!
  image: String
  name: String
  username: String
}

input VoteInput {
  targetId: ID!
  value: Int!
}

type VoteResult {
  score: Int!
}