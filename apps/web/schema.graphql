type Comment implements Node {
  author: String!
  authorId: ID!
  body: String!
  createdAt: String!
  deletedAt: String
  id: ID!
  myVote: Int
  parentId: ID
  score: Int!
  updatedAt: String!
}

type CommentConnection {
  edges: [CommentEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type CommentEdge {
  cursor: String!
  node: Comment!
}

type CommentContribution {
  bodyExcerpt: String!
  createdAt: String!
  id: ID!
  kind: String!
  postId: ID!
  postTitle: String!
  score: Int!
}

type ContributionConnection {
  edges: [ContributionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ContributionEdge {
  cursor: String!
  node: ProfileContribution!
}

type Definition implements Node {
  author: String!
  authorId: ID!
  body: String!
  createdAt: String!
  id: ID!
  myVote: Int
  score: Int!
  updatedAt: String!
}

type DefinitionContribution {
  bodyExcerpt: String!
  createdAt: String!
  id: ID!
  kind: String!
  score: Int!
  termSlug: String!
  termTitle: String!
}

type Health {
  environment: String!
  status: String!
}

type LandingStats {
  totalAuthors: Int!
  totalComments: Int!
  totalDefinitions: Int!
  totalPosts: Int!
  version: String!
}

type DeleteCommentPayload {
  comment: Comment
  deletedCommentId: ID
}

type Mutation {
  addComment(body: String!, parentId: ID, postId: ID!): Comment!
  addDefinition(body: String!, termSlug: String!, termTitle: String): Definition!
  deleteComment(id: ID!): DeleteCommentPayload!
  deleteDefinition(id: ID!): String!
  deletePost(id: ID!): ID!
  editComment(body: String!, id: ID!): Comment!
  editDefinition(body: String!, id: ID!): Definition!
  editPost(body: String, id: ID!, title: String): Post!
  retractCommentVote(commentId: ID!): Comment!
  retractDefinitionVote(definitionId: ID!): Definition!
  retractPostVote(postId: ID!): Post!
  setUsername(value: String!): User!
  submitPost(body: String, tags: [TagInput!]!, title: String!, url: String): Post!
  voteDefinition(definitionId: ID!): Definition!
  voteOnComment(commentId: ID!): Comment!
  voteOnPost(postId: ID!): Post!
}

interface Node {
  id: ID!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Post implements Node {
  author: String!
  authorId: ID!
  body: String
  commentCount: Int!
  comments(after: String, first: Int): CommentConnection!
  createdAt: String!
  host: String
  id: ID!
  myVote: Int
  score: Int!
  slug: String
  tags: [Tag!]!
  title: String!
  updatedAt: String!
  url: String
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PostContribution {
  bodyExcerpt: String
  createdAt: String!
  id: ID!
  kind: String!
  score: Int!
  slug: String
  title: String!
}

type PostEdge {
  cursor: String!
  node: Post!
}

enum PostSort {
  discuss
  hot
  new
  top
}

type Profile implements Node {
  commentCount: Int!
  contributions(after: String, first: Int): ContributionConnection!
  definitionCount: Int!
  id: ID!
  postCount: Int!
  totalKarma: Int!
  user: User!
}

union ProfileContribution = CommentContribution | DefinitionContribution | PostContribution

type Query {
  health: Health!
  landingStats: LandingStats!
  me: User
  node(id: ID!): Node
  post(idOrSlug: String!): Post
  postComments(postId: String!): [Comment!]!
  posts(after: String, first: Int, host: String, sort: PostSort): PostConnection!
  profile(username: String!): Profile
  term(slug: String!): Term
  terms(limit: Int, sort: TermSort): [Term!]!
}

type Tag {
  kind: String!
  label: String!
}

input TagInput {
  kind: String!
  label: String
}

type Term implements Node {
  count: Int!
  definitions: [Definition!]!
  excerpt: String
  firstAt: String
  id: ID!
  lastEdit: String
  slug: String!
  title: String!
  totalScore: Int!
}

enum TermSort {
  popular
  recent
}

type User implements Node {
  email: String!
  id: ID!
  image: String
  name: String
  username: String
}